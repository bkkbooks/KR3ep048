body:
  text: 卷下咳嗽案一兒感風食鹹味其嗽便發發時痰喘不休胸部微高起若弗治眼目必紅便成龜胸痼疾陳皮枳殼甜杏仁桑白皮前胡黃芩甘草炙麻黃服二劑後煎潤肺膏調理而愈案一兒面白喉如曳鋸此肺邪內郁風寒外束宜發散外邪為主陳皮桑皮甜葶藶陳膽星竹瀝鉤藤桔梗案一兒夏月每午後咳嗽大作不能安睡火刑金也宜清熱降火為主川黃連黃芩黑山梔元參花粉桑白皮枳殼甜杏仁甘草案一童哮喘已六七年每遇勞力或感寒食鹹便痰鳴氣喘定後方發時服羌活乾葛防風江枳殼新會皮前胡杏仁桑皮粉甘草嫩桔梗葶藶生薑又百合紫菀麥門冬天花粉陳皮枳殼知母黑元參綿黃耆黃芩桔梗甘草服前方三劑待喘減以此方服五六劑去黃耆然後照方蜜丸白湯送下二錢平時服案一童色欲過度腎水枯竭致君相二火上炎傷肺乾咳氣促漸至聲音不出元氣與肺氣損極之候定後膏滋藥方人參淮山藥米仁百合紫菀茸天冬麥門冬桔梗甘草煮膏日進二錢又人參白茯苓白朮米仁淮山藥蓮肉訶子肉甘草蜜丸與膏滋間服案一兒頻咳唇紅作渴聲音不清若初起最忌寒涼今延綿日久久郁生熱以清肺順氣之劑投之元參桔梗花粉麥門冬黑山梔陳皮枳殼甘草熟蘇子甜杏仁案一兒咳日輕夜劇此食積作咳消食為主陳皮山楂白茯苓前胡白芍藥麥芽厚朴嫩桔梗甘草案一兒歲許咳嗽不已面部發微紅細瘰此熱邪內郁風邪外束風熱相摶於肺不宜用寒涼藥紫蘇葉葛根新會皮薄荷桔梗黑元參前胡黑山梔案一兒面白體肥微熱喉有痰風邪在肺為患柴胡前胡陳皮江枳殼桑白皮桔梗蘇子甘草諸症平伏但咳嗽未止元參桔梗花粉桑白皮黑山梔黃芩甘草案一兒壯熱五六日困倦弄舌咳嗽氣促乃時症初起宜當解散薄荷葉柴胡陳皮枳殼潤元參川黃連黃芩桔梗甘草淡豆豉案一兒唇紅作渴痰嗽氣喘三月有餘骨瘦如柴此食積久滯有疳弱之虞消食清熱降痰為主陳皮山楂麥芽江枳實川黃連黃芩蘇子桑皮上為細末水飛為丸青黛為衣每服百丸空心白湯送下案一兒大病後咳嗽腹痛間發潮熱唇紅面白肌膚羸瘦飲食少進精神疲倦此元氣未復陽元無所依而陰浮於外也陳皮白芍知母地骨皮當歸身柴胡法夏白朮粉甘草案一兒腫咳未除繼而乾咳腹脹四肢倦怠飲食難化此脾土不足既不能生肺金又為肝木乘之治以制肝補脾清肺陳皮白芍紫厚朴香附麥門冬腹皮黃芩焦白朮車前案一女身熱已涼咳嗽不止舌有白苔胸高氣逆煩躁不食惟嗜酒睡臥不寧此內有積熱外感風邪肺氣不順故也陳皮黃連大腹皮山楂桑白皮前胡蘇子雲茯苓山藥陳膽星案一兒頭疼身熱腹痛嘔吐發嗽左脅痛此外感風邪內傷食積所致防斑前胡杏仁山梔新會皮江枳殼柴胡山楂元參桑白皮天花粉案一兒咳嗽身熱至晚煩躁不睡此時行外感柴胡葛根前胡桑白皮法半夏陳皮枳殼黃芩山楂肉案一兒痰嗽有血因積熱未除心火太盛燒爍肺金陽盛陰虛有升無降血隨氣上越出上竅而然宜清金平木使脾無賊邪之患滋液驅熱使肺得清化之源無有不安者柴胡白茯苓陳皮江枳殼黑山梔元參天花粉甘草肥知母麥門冬案一兒二歲先咳嗽繼之身面浮腫宜定喘退腫然後理脾前胡桔梗桑白皮葶藶子車前陳皮杏仁青防風天哮天哮乃天氣不正乍寒乍熱小兒感之遂眼胞浮腫咳嗽則眼淚鼻涕漣漣或乳食俱出者是也於數日內宜服發散如防風前胡枳殼陳皮紫蘇杏仁桑皮麥冬桔梗甘草之屬如氣逆加蘇子有痰用膽星貝母二十日後宜保肺清金紫菀百合兜鈴五味知母麥冬貝母款冬之屬不應則訶子之類俱可擇用案一女天哮因感冒風邪而起以致喘咳不已又多食酸味嗽愈甚其氣上不能升下不能降痰涎壅遏且善飲食脾不運化精微停滯於胸化而為淡今病久氣虛不宜寒涼及大補之劑化痰順氣清金為主橘紅五錢杏仁去皮炎一兩貝母去心一兩嫩前胡一兩山楂肉一兩蘇梗一兩元參五錢枳殼五錢陳膽星一兩粉甘草二錢水煎入飴糖二兩竹瀝一小杯收成膏案一兒瘧後天哮又兼腹實發瀉面腫少食皆脾虛之徵也須健脾溫胃佐以消積之劑陳皮山楂白芍藥川黃連甘草神麯厚朴赤茯苓建澤瀉木通木香燈心案一兒頓咳不止時吐或甚則連乳俱出身微熱飲食減面色稍赤皆風邪暑熱所侵未經疏散邪傳心肺變而為熱熱生風風生痰痰結胸中肺氣不順連嗽不止則痰乳食物一時吐出治宜祛風化痰清金降火陳皮枳殼元參天花粉熟蘇子防風杏仁前胡嫩桔梗枯黃芩案一兒感冒風邪肺氣不清已成天哮三四日即愈至七八日復感風邪遂鼻流清涕不已治以退熱祛風順氣陳皮枳殼黃芩紫蘇葉青防風前胡蘇子楂肉肥知母粉甘草案一兒天哮嗽月餘矣遇嗽則口鼻出血因吊動痰火火泛血上也初起宜祛風清肺今嗽已久議保肺治嗽消痰百合紫菀款冬花膽星馬兜鈴花粉黃芩黑元參知母黑山梔當歸案一兒天哮久久痰涎壅塞哭不出聲已犯痰嗽不已驚風至之句急宜降痰順氣鎮驚之劑先服紫金錠次服滾痰丸加竹瀝薑汁化服案一兒天哮甚則吊吐鼻血此風氣傳染氣逆上衝初起宜發散今已數日宜瀉肺清金順氣消痰俟嗽勢稍減進保肺之品陳皮桑白皮桔梗黑元參前胡黃芩黑山梔杏仁青防風枳殼蘇子案一兒哮喘二十餘日每吊嗽則吐盡飲食兩脅作痛紫菀百合桑白皮前胡新會皮枳殼膽星款冬花黃芩枇杷葉知母案一兒哮喘半月時常痰涎壅塞如驚風狀此肺經氣逆所致陳皮膽星蘇子桑白皮甜杏仁桔梗枳殼檳榔青防風鉤藤鉤案一兒向患哮喘每遇風寒或食鹹味輒喘促不休先進順氣消痰再議補肺杏仁桑白皮瓜蔞仁元參桔梗陳皮熟蘇子江枳殼前胡防風花粉案一女年十六元氣充實猶不時舉發擬調理一法使腠理固密可霍然矣橘紅黃芩川黃柏知母川貝母元參棗仁當歸身白芍元生地淮藥天冬麥門冬蜜丸附治天哮方楂肉一兩麥芽一兩竹葉四錢青餅二兩飴糖四兩煎膏服一方加檳榔五錢茶葉五錢石膏一兩肺氣痰喘案一兒三四月許藏之重褘衣衾過厚且每坐火側以致熱氣熏蒸忽爾啼聲不出腹實痰鳴口角微斜兩目上視勢屬危險乃風火相摶有似急驚先用竹瀝磨黑錠一丸次服寬氣降痰之劑乾葛荊芥防風江枳殼熟蘇子前胡陳皮桔梗甜杏仁陳膽星鉤藤又次日症象稍減前方加殭蠶黃芩案一兒初起感冒壯熱不止氣粗發嗆口渴唇乾舌有芒刺由先感風邪復傷暑傷乳宜順氣消痰清暑淡豆豉陳皮枳殼山楂川黃連黑山梔蘇子甘草鉤藤陳膽星加竹瀝服之次日諸症未減邪熱仍熾前方去淡豆豉蘇子加元參花粉黃芩前胡桔梗案一兒面白無神喉有痰聲兼有風麻糞若不順氣消痰則痰凝氣結成驚風為易易也陳皮枳殼法半夏陳膽星蘇子防風前胡甜杏仁桑白皮案一兒感冒發熱痰聲如曳鋸解熱消痰順氣為主柴胡前胡陳皮江枳殼黑元參桔梗黃芩花粉熟蘇子陳膽星鉤藤案一女咳喘痰鳴發無定時發則至晚更劇陳皮枳殼桑白皮熟蘇子前胡杏仁防風葶藶子粉葛根山楂桔梗甘草喘甚加麻黃又橘紅麥冬黑元參川黃連山楂貝母黃耆陳膽星案一兒外感身熱痰喘腹實此肺氣痰喘也前胡膽星熟蘇子桑白皮杏仁枳實山楂葶藶子炒麥芽桔梗甘草又元參花粉陳膽星桑白皮山楂麥芽陳皮熟蘇子法半夏前胡枳殼桔梗粉甘草案一兒肺氣痰喘服黑錠藥後瀉下痰涎而咳喘如故前胡陳皮甘草桑白皮陳枳殼桔梗黃芩黑梔陳膽星又桔梗枳殼杏仁桑白皮法半夏陳皮甘草案一兒痘發臭後傷於風食痰喘目直上視已屬危險但見聲音清爽投以消痰順氣之劑以望僥幸前胡陳膽星熟蘇子桔梗貝母牛黃案一兒痰喘氣促目睛上視哭不出聲此肺風痰喘因內有熱向外為風邪壅遏與驚風相似但不搐掣為異耳久則不治擬疏風解表之劑案一兒表熱未解痰喘氣促兩目浮腫此風痰膠固而然也速則成驚遲延疳弱法當清肺消痰和風鎮驚陳皮枳殼熟蘇子陳膽星黃芩桔梗鉤藤瓜蔞仁桑白皮杏仁防風案一兒痰火內郁風寒外束擬疏風解表桑白皮瓜蔞仁蘇子前胡桔梗黑山梔枯黃芩麻黃元參橘紅竹瀝案一兒脾虛發喘身熱防風萊蔔子桔梗甜肉桂車前腹皮甜葶藶痰症案一兒向有胎熱發黃之症調理愈後忽然身熱兼有青塊氣促痰鳴口疳兩目眥及上下唇俱有血水舌紅腫不能吮乳此內有蓄熱外有暑濕相摶心火燒爍肺金故咳而喘金受制不能平木木寡於畏兼風相摶侮所不勝故肌膚遍發青塊火勢炎上衝動其血故見之於兩目總宜解毒清火俟其稍減然後徐治其本陳皮枳殼黃芩黑山梔川黃連甘草花粉香薷麥門冬案一兒身發壯熱痰鳴氣促脅痛鼻張此內有熱邪風邪郁遏於外宜先用疏風順氣之劑次用利便降痰乃為正治醫以下之三晝夜不能臥勢甚危險仍擬疏散麻黃枳殼前胡桑白皮青防風蘇子杏仁檳榔服後用滾痰丸下之諸症悉愈案一女目痠面跳眉稜骨重手足麻木脈弦滑而數據脈論症顯系痰在肝經所致宜二陳加減治之陳皮法半夏雲茯苓甘草獨活青皮明天麻青防風案一兒項中發癤三四月方愈向時或於當風拭膿致風邪入於泥丸穴郁久不散轉而為熱熱久生痰火載痰上入於巔頂故頭重不舉定後方服之而痊陳皮法半夏雲茯苓黃芩山梔殭蠶明天麻藁本生薑案一女十八歲痰涎壅滯不省人事一醫用滾痰丸下之神氣頗清此後宜消痰順氣已為合法乃復用滾痰丸遂致胸前飽悶氣不舒暢前症仍作余治先用石菖蒲一兩通其經絡使痰無壅滯之患服後飽悶頓減稍省人事詢其月事過期不至治宜行經為主經行而氣自治矣紅花桃仁陳皮澤蘭葉石菖蒲楂肉牛膝癇症案一兒患癇久久諸醫莫療乃心火內郁痰迷胞絡所致久而不愈內外燒爍金受火制陰分日虧又投以香燥金石之藥無怪其愈治愈劇也余治以養血安神為主清火和氣佐之川黃連酸棗仁茯神膽星犀角麥門冬柏子仁山楂白芍橘紅生地黃石菖蒲當歸紫蘇案一兒十三歲因出外讀書既有憂思之感遇危橋又有驚恐之虞每晚睡臥不安時見微搐有以瘧治而用發散者有謂傷食而用消導者有謂痰熱積聚而用攻逐推蕩者雜投而病愈增逐致痰涎膠固胸膈作痞口吐涎沫飲食不進或昏暈不省或叫號跌撲驚跳搐掣夜靜晝劇午前為最腹中有形如彈或左或右睡止一邊不能轉側病樣多端難以盡述總之心火上炎肝陽偏旺脾土困頓復以逐痰搜風及金石香燥之藥傷及肝脾之陰故見症若此擬固護元氣為主清熱消痰佐之人參白朮白茯苓法半夏鉤藤陳皮柴胡陳膽星川黃連竹瀝服數劑即前方加龍膽草甘草又病勢大減但頭暈即前方減參柴竹瀝加天麻甘菊案一兒二歲發驚風三次忽目直上視身體壯熱左手足不為用因風痰膠固心脾二竅而然宜順氣消痰祛風瀉火犀角一兩黃連一兩桂皮二錢陳膽星一兩明天麻一兩黃芩一兩五錢法夏一兩四錢鉤藤一兩四錢熟殭蠶一兩四錢廣橘紅一兩枳殼一兩當歸一兩上為細末薑汁竹瀝調和每服二錢案一童發搐而痰涎壅塞時作時止乃風火相摶邪鬱於中脘氣不能運行升降故也宜降氣消痰佐以清火平肝陳皮枳實龍膽草熟蘇子茯神黃連生地白芥子半夏曲鉤藤膽星竹瀝石菖蒲案一兒曾以傷食損其脾胃稍有所感便嘔吐發搐昏僕不省至大便通方蘇飲食始進此由胃不能遊溢精氣脾不能運化精微致有升無降耳當理脾胃寒涼克伐之劑在所禁用人參白朮茯苓半夏曲新會皮天麻鉤藤陳膽星川黃連山楂肉甘草案一兒五歲發搐痰涎壅塞時作時止此風火相摶所致名曰陽癇宜消痰理氣清熱平肝明天麻膽星殭蠶黃芩川黃連江枳殼鉤藤當歸竹瀝嫩桂枝半夏曲案一兒痘後神氣未復更兼火毒內郁失於清理致睡臥不寧煩躁時作或角弓反張癇症已萌宜平肝鎮驚白芍藥茯苓當歸山藥川黃連陳膽星鉤藤甘草牛黃眩暈案一兒忽昏暈不省少頃如故此腎水不足氣不歸元奔逆而上宜補腎兼以消痰降火人參白朮茯苓黑山梔山萸肉陳皮法夏池菊淮山藥川黃連甘草生薑案一兒身體肥胖誦讀勞心擾動其陽便眩暈噁心作嘔此火動其痰也又素喜食肉戒其少食以清中和之氣擬清熱消痰橘紅山楂法半夏川黃連茯苓山梔麥芽案一童素有內熱飲食少進兩尺洪大而虛乃相火妄動坎離不交宜滋陰降火為主川黃柏肥知母麥冬生地當歸地骨皮川黃連秦艽白芍陳皮粉甘草積聚案一兒因飲食太過損傷脾胃面黃腹脹服消導之劑腹脹已除今脈數唇紅面黃食少骨蒸內熱由脾元衰敗而然也擬消積清熱之中佐以扶元陳皮山楂川黃連白芍藥麥芽厚朴白朮淮山藥地骨皮知母人參案一兒向以脾胃受傷積聚內起致腹大脹滿漸至飲食步履俱廢醫以補中行濕利水治之半年餘不效余視之脈沉小而實腹堅實有形乃積滯膠固與單腹脹又屬兩途擬攻積除堅間服補脾開胃攻補兩施始得尋愈今交春肝木得令不飢食減腸胃傳化失職恐前症復萌取丸劑以緩攻為宜仿古法之所有非杜撰也黃連陳皮香附山楂肉焦麥芽神麯厚朴青皮萊蔔子焦白朮白芍膽草水泛為丸案一兒腹痛有形如癖脈沉細獨肝部洪而急乃傷於怒氣而得之怒則氣逆致六腑濁滯而為聚服消積之劑脈見虛象是虛中挾滯不宜純用攻堅之劑陳皮青皮人參雲茯苓法半夏柴胡當歸白芍川撫芎粉甘草蜜丸案一兒痢後時常寒熱腹痛十指忽腫而無痛苦左脅下如覆杯往來攻痛氣逆作喘此肺之積也名為息賁蘇子桑皮山楂細青皮甜葶藶法夏陳皮厚朴案一兒面色不榮眼白飛青乃肺金不足而然當大培脾土以生金則肺家之積自除黃耆白朮茯苓當歸身白芍藥楂肉麥芽陳皮淮山藥薏苡米炙草上為細末神麯漿糊丸每服二錢黃米湯調服案一兒痘後兩月因傷食太過致身熱不已胸腹脹滿乃氣滯鬱熱六腑為聚議用和劑陳皮楂肉川黃連雲茯苓甘草知母柴胡青防風案一兒面色微黃身熱食減痰嗽作嘔二便如常乃傷食兼暑熱所致藥宜溫和油膩之物少進恐增秋痢陳皮楂肉白芍藥川黃連知母法夏香茹雲茯苓案一兒向有蟲積腹痛服藥下蟲數條糞後有鮮紅血遂發瀉痢紅白面色萎黃肌膚瘦削復兼外感發熱嘔吐飲食減少擬消積健脾兼散為主陳皮山楂白芍藥青防風柴胡川連神麯廣藿香赤茯苓木通石蓮甘草盤腸驚案一兒腹中鳴啼哭不止甚則身體傴僂此盤腸驚也用鉤藤丸煎後劑送下鉤藤木通新會皮山楂肉甘草案一兒初病如瘧秋涼繼受口腹不節致中脘氣滯鬱蒸為谷疸茵陳茯苓白蔻仁瓜蔞實桔梗案一兒身目俱黃尿赤乃濕熱鬱遏而成法當通利三焦氣分陳皮紫厚朴山楂香附川黃連山梔綿茵陳赤芍木通建澤瀉案一兒不慎食物脘中濕熱內蒸溲黃此食積所致茯苓紫厚朴山楂陳皮粉豬苓澤瀉綿茵陳案一兒十二歲面目俱黃口渴溲黃皆由脾胃濕熱所致豬苓蒼朮紫厚朴甘草龜背案一兒始患咳嗽後成龜背之症背脊曲處作痛以肺與大腸相表裡咳傷肺氣氣道壅塞大腸之氣亦滯且大腸之頭附於脊骨處故傴僂作痛鉤藤陳皮江枳殼嫩桔梗甘草案一兒已成龜背兩足不能移此先天不足急宜血肉有情之品培補真元鹿茸虎頸骨熟附子肉桂人參龜板雲茯苓淮山藥萸肉生地諸血案一兒咳咯瑪王形狀之痰小腹作痛脾肺脈虛而疾尺濡軟水虛金衰之候戒之在色庶乎可圖麥冬百合雲茯苓川貝母紫菀淮藥米仁新會皮阿膠白及童便案一童十七歲因遭兄姐連喪悲傷抑鬱忽患吐血六脈微數詢其血之來不咳不咯不唾非關於肺腎二臟可知如誤作房勞傷損陰虛火動進諸寒涼降火填補滋膩之品將絡中所離之血復結而為瘀矣宜和血順氣丹皮赤芍藥知母當歸桃仁泥生地元紅花橘紅貝母粉甘草加童便服五六日後又吐鮮紅血二碗許投以後方赤芍柴胡元參側柏葉赤茯苓黃芩荊芥川芎川貝母枇杷葉加荷蒂案一童於幼年讀書時曾患吐血服滋陰降火而愈後因勞頓復吐血碗許痰鳴氣促兩脅作痛此肝脾鬱滯努力擾動絡脈故也貝母元參花粉新會皮江枳殼生地當歸藕節元紅花服二劑右脅痛減痰中帶紫血水左脅仍痛是肝氣尚未疏暢猶有痰涎停滯故也前方去枳殼加青皮丹皮白芍又三劑左脅痛亦除痰涎紫血仍有用瓜蔞霜貝母蘇梗麥冬甘草桔梗陳皮當歸生地阿膠附吐血論治東垣曰吐血出於胃成碗成盆是也胃者守營之血守而不走存於胃中因胃虛不能攝血故令嘔吐從喉而出於口也初起宜當歸生地桃仁紅花丹皮赤芍甘草橘紅枳殼知母童便之類夏月加黃芩或有鬱而致者加貝母挾痰加元參花粉如吐不止不宜多用涼血之藥當以此方主之麥冬百合真阿膠川貝母紫菀米仁甘草淮山藥雲茯苓白及陳皮桔梗金匱湯云吐血不止柏葉湯主之柏葉乾薑各二兩艾三把水五升取馬通一升合煮一升溫服凡吐血不止則氣血皆虛虛則生寒柏葉生而西向稟兌金之氣可制肝木木主升金主降取其升降相配夫婦之道和則血得以歸藏於肝矣故用以為君乾薑性熱炒黑則止而不走用補虛寒之血艾葉溫而能入內不炎於上可使陰陽之氣反歸於里以補其寒用二味為佐馬通者為血生於心心屬午於是用午獸之通主降火消停血引領而行為使此仲景吐血之準繩可以觸類而長之凡吐血後見痰者是陰虛滋陰降火主之生地熟地天門冬麥門冬黃柏知母陳皮焦白朮薑棗煎入竹瀝薑汁童便少許如吐血後身熱加地骨皮柴胡不應加炮姜三分如盜汗不止氣血虛也加黃耆棗仁氣急加桑皮紫菀凡吐痰後見血者是積熱也清肺湯主之陳皮白茯苓當歸身生地白芍紫菀天門冬桑白皮黃芩黑梔甘草阿膠烏梅如喘急去天門冬加蘇子又血出於口鼻者犀角黃芩黃連以清之或加茅花藕節棕炭熟蒲黃以止之或加薑汁韭汁童便山茶花丹皮以消之血出於大便者槐花側柏葉條芩以清之地榆荊芥白芷茅根以止之血出於小便者瞿麥麥冬山梔以清之滑石木通大小薊之類行之或清或行或止當視其新久治療之法總以四物湯為主丹溪吐血方青黛瓜蔞霜訶子肉海粉黑梔蜜丸噙化梔黛所以降火瓜粉所以行痰訶肉所以斂肺有氣有火則咳有痰有血則嗽咳血者出於肺咳則痰中帶血是也清痰湯主之當歸白芍藥桃紅貝母焦白朮丹皮黑山梔黃芩桔梗小青皮甘草吐血而有血屑者謂之咯血自腎經也清咯湯主之陳皮法半夏雲茯苓知母貝母生地黑山梔真阿膠桔梗甘草杏仁桑白皮唾血亦出於腎鮮血隨吐而出也清唾湯主之知母川貝母黃柏桔梗元熟地遠志天門冬乾薑麥冬黑元參大便血者因臟腑蘊積濕熱所致清臟湯主之熟地當歸身川芎白芍川黃連黃芩黑山梔黃柏槐花側柏葉阿膠如腹痛加陳皮傷風加荊芥氣虛下陷加升麻心血不足加茯苓虛寒加炒黑乾薑大虛加參術腸風糞前來名近血柏葉湯主之側柏葉當歸川黃連枳殼槐花地榆炭荊芥炙甘草烏梅久不止用地榆散烏梅一兩去核五倍子五錢枳殼一錢半槐米二錢川黃連三錢白芷一錢椿根皮三錢地榆三錢荊芥三錢為末空心酒調服藏毒糞便後來者名遠血解毒湯主之黃芩黃連黃柏黑山梔炒槐花連翹細辛甘草遠血自小腸來吳茱萸炒黃連木通為主久不止用槐花散當歸地榆炭元生地黃芩升麻枳殼真阿膠側柏葉槐花防風心移熱於小腸故小便出血清腸湯主之生地當歸黑山梔白芍川黃連黃柏瞿麥赤茯苓萹蓄細木通麥冬甘草燈心如莖中痛去芩芍加滑石枳殼血從鼻出者謂之衄此由火逆於中血隨火而上也吐者責之府衄者責之經蓋經者走血之經火氣急放血走而不守隨氣而行直犯清道而上循於鼻也犀角地黃湯主之火者心之所屬故生地犀角涼心而退熱心者肝之所生故用丹皮白芍平肝而瀉母又有傷暑吐衄者可用河間法其症面垢口渴喜飲乾嘔腹痛脈虛多汗後二方主之黃連解毒湯白虎湯又當歸赤芍黃芩黑山梔川黃連生地香附桔梗粉甘草側柏葉藕節水煎入童便溫服久不止用麥冬枇杷葉側柏葉生地傷暑加香薷又久不止氣微力弱者不可純用涼劑宜以此方出入治之黃耆赤芍赤茯苓當歸身熟地阿膠白芍腹痛案一兒身熱咳嗽腹中有痞升起作痛肌肉羸弱宜消補兼施青皮枳實柴胡川黃連白芍藥白朮黃芩桔梗案一兒先因外感繼增腹痛背脊突起腰屈不伸鉤藤當歸白芍藥山楂新會皮甘草又鉤藤元胡索小青皮陳皮甘草龍膽草案一兒傷暑腹痛拒按香薷川黃連厚朴陳皮山楂甘草燈心案一兒向有蟲積腹痛痛時凝聚有形面黃微腫宜兼疝治金鈴子川楝子茯苓陳皮木通細青皮建澤瀉山楂又白朮茯苓淮山藥焦米仁白芍木通澤瀉粉甘草案一女發熱二日忽目直上視胸膈大痛嗽嘔有血鼻微有血不思飲食乃食傷填塞胃口脾氣不升胃濁不降故作痛而嘔氣逆血亦因之而上也宜消食為主陳皮枳實山楂肉檳榔紫厚朴神麯麥芽萊蔔子大黃案一兒患腹痛不思飲食夜發驚惕唇紅面白乃蟲積為患痛傷元氣故也陳皮白芍藥青皮山楂肉茯苓藿香酸棗仁山藥案一兒向多性躁因食粽復夜起胃寒遂中脘作痛溫中消食為主青皮草豆蔻香附山楂萊蔔子陳皮焦麥芽甘草又青皮山楂肉陳皮白芍川黃連香附元胡索白朮甘草蓬莪朮蜜丸空心服一錢二分案一兒中脘作痛腹脹滿噁心厭食乃宿食停滯所致青皮草蔻法半夏白芍藥藿香厚朴山楂焦麥芽熟砂仁案一兒腹痛鼻間青色涕出此天令暴寒形寒傷冷復不節飲食陳皮厚朴山楂肉焦麥芽白芍甘草生薑案一童中脘作痛發時欲吐不吐以香砂枳實丸主之陳皮山楂麥芽川楝子石菖蒲枳實香附砂仁法半夏建神麯白朮蜜丸案一童曾患骨蒸後因坐臥磚石之處致寒熱摶於肝經少腹厥氣上衝睪丸作脹此熱鬱於內而寒束於外也當疏肝為主青木香陳皮白芍澤瀉川楝子小青皮木通柴胡黃連案一兒飲食不調濕熱鬱蒸腹痛止作無定往來上下行痛懊憹嘔吐清水此濕熱生蟲生積所致宜苦寒泄熱兼調脾胃使君肉香附青皮檳榔川楝子川黃連山楂麥芽神麯江枳殼白芍藥茯苓案一兒發熱腹痛頭面周身作癢搔則紅瘰如雲頭此風毒而加之以濕熱投防風通聖散加減而愈防風荊芥前胡薄荷葉黑元參山梔滑石陳皮江枳殼連翹仁甘草案一兒四歲患腹痛半月餘矣日夜必發四五次身漸羸瘦醫以蟲積治不效舟載入城豫以大黃枳實陳皮甘草大劑熱服其痛如失正經所謂治熱以寒溫而行之之法也案一兒大病後咳嗽腹痛間發身熱唇紅面白消瘦食減神倦乃元氣未復陽無所依而陰浮於外故也白朮茯苓當歸身法半夏陳皮白芍知母地骨皮軟柴胡甘草案一女向有積熱未除身熱腹痛不思飲食宜化積消食理氣陳皮青皮紫厚朴萊蔔子山楂枳殼白芍淡豆豉枯黃芩柴胡案一兒四肢作痛繼而腹痛泄瀉而四肢痛因之以減此濕熱之邪下行矣當以泄瀉治厚朴陳皮甘草建澤瀉山楂肉川連白芍檳榔江枳實小青皮木通案一兒素多內熱今腹痛屢發聲嘶神倦胸膈不舒宜寬中下氣清熱為主陳皮青皮江枳殼白芍藥黃連山梔楂肉案一兒心腹痛睡臥不寧神思倦怠此心腎不交宜養血安神不可專以破氣為事人參白茯神遠志肉當歸生地麥冬天門冬川黃連白芍山梔陳皮川貝母案一兒胸膈作痛引至背此氣滯血虛所致不得以氣食例論治陳皮白芍當歸身川撫芎青皮生地香附案一兒坐於石上寒氣入於厥陰致腎囊睪丸腫大作痛法宜疏肝散逆兼通太陽之裡柴胡青木香青皮木通金鈴子豬苓建澤瀉腫脹案一兒遍體浮腫此風水也擬上下分消法乾葛羌活防風熟蘇子大腹皮木通澤瀉車前新會皮江枳殼桑皮茄皮燈心服二劑腫勢減半去羌活枳殼加白朮茯苓山藥案一兒腹脹五十餘日漸至妨食嘔吐此脾胃兩虛擬溫補為主人參白朮乾薑淮山藥廣藿香烏梅甘草案一兒數歲因喪母悲思太過致心脾郁損身熱脘悶面無華色神倦形瘦下部浮腫陰囊脹大一醫以食積治投消食清熱之劑遂畏寒嘔吐轉增泄瀉皆久服寒涼克伐脾胃衰敗之象恐醫藥難挽人參白朮淮山藥米仁杜車前澤瀉木瓜山萸肉肉桂服二劑後六脈代止不勻胃脈絶矣奈主強藥勉議一方即前方去萸肉木瓜肉桂加附子服之究竟不起可悲也案一兒陰囊腫亮少腹脹急由坐臥於陰濕處以致搏於皮膚而成此症宜解表行氣利水粉葛根薄荷葉防風陳皮木通杜車前萊蔔子枳殼蘇子山楂案一兒患瘡忽腹脹氣急上下俱微腫此先有瘡毒復感風邪內外相摶榮氣不從乃成腫脹宜先以散風為主防風荊芥乾葛江枳殼新會皮桑皮蘇子杏仁案一兒腫脹日久脾氣已損復感風邪咳嗽羌活防風前胡桑白皮熟蘇子杏仁木通豬苓甜葶藶天花粉腹皮生薑案一童瀉久肢腫腹脹乃土虛不能制水當補中利水行濕為主陳皮茯苓白朮生米仁淮山藥人參半夏厚朴大腹皮建澤瀉木通山楂案一女十歲秋間曾患瘡瘍雖已痊愈飲食尚少至望前夜發潮熱腹脹臍突晚臥不安咳嗽氣急咸以瘡毒入腹治之以其便難又行下法諸症更劇延豫診視脈俱洪數系積熱既久脾土衰弱不能生肺金木寡於畏而來侮土故腹脹如鼓兼之睡臥氣促痰火上升也經曰諸脹腹大皆屬於熱又曰諸濕腫滿皆屬於脾乃知脾虛為本濕熱為標法當降火清金補脾行濕麥冬黃芩川黃連雲茯苓厚朴澤瀉腹皮甜葶藶杜蘇子山藥半夏桑皮案一兒遍身浮腫少腹脹痛小溲不利欲吐因痰涎膠固於膈且久乏穀氣不敢妄行攻擊陳皮木通甜葶藶杜車前澤瀉枳殼腹皮青防風上云珀案一兒向有積熱哮喘觸之即發前患瘧疾月餘方愈然脾氣已損以致遍身浮腫哮喘頻發不得臥食則稍可此虛火炎上之徵但久病之後脾肺兩虛能進參術猶可挽回若仍用利水之劑則非余之所知人參白朮茯苓麥門冬桑白皮桔梗陳皮蘇子馬兜鈴案一兒水腫上部已退飲食未進宜補中行濕利水陳皮木通建澤瀉杜車前白朮茯苓山藥山楂肉建神麯藿香半夏腹皮案一兒先腫後喘手足逆冷不思飲食脈小而沉此脾傳肺也經謂之陰水理宜補脾扶元以其喘急先治其標炙桑皮茯苓皮蘇子車前腹皮細木通建澤瀉陳皮案一兒身多瘡疥浴後瘡勢稍減忽遍身發腫心胸頭面更甚氣促不能眠日晡更劇乃瘡瘍久耗其真元腠理不密風邪入客於肺而腫且喘也宜疏肺解表治之甜葶藶杜蘇子桑皮杏仁枳殼炙麻黃青防風荊芥前胡汗症案一兒遍身有汗頭額更甚經云汗者心之汗東垣主脾胃有濕今自汗食減䐜脹宜以濕熱兼治陳皮當歸白芍藥地骨皮楂肉黃耆黃連粉甘草案一兒病後自汗不止形神困疲五心煩熱此陰虛有熱也當歸生地熟地川黃柏枯黃芩黃耆黃連茯神白芍藥酸棗仁甘草淋症案一兒五歲身面俱黃煩渴小水頻數乃食積傷脾兼之濕熱相乘所致治當消積退黃利小便陳皮山楂麥芽厚朴細木通山梔澤瀉黃連瞿麥綿茵陳案一兒三歲便濁如泔此食積蓄熱所致久而不治則成腎消陳皮山楂麥芽紫厚朴生山梔木通赤芍黃連龍膽草案一兒胸膈脹痛飲食少進六脈沉細而數便濁莖痛甚則帶血當清利膀胱蓄熱當歸身生地黃柏龍膽草木通杜車前澤瀉赤苓上云珀石韋石蓮肉案一童知識太早陰未生成早泄溲短澀莖痛法宜壯水和陽黃柏知母熟地金櫻子豬脊髓龜板牡蠣芡實目症案一兒數歲左目白珠紅赤難於張開向服眼科寒涼之劑致外邪鬱而不散宜解表為主佐以養血川芎荊芥薄荷葉川黃連生地陳皮當歸小連翹青防風甘草燈心案一兒風毒上攻目赤腫痛乃天行時症以九仙散加減治之薄荷葉羌活川芎防風當歸身川黃連甘草案一兒痧後餘毒未盡復感風邪遂眼胞浮腫右珠突出宜清熱解毒退翳為主黃芩川黃連連翹青防風蟬退花粉龍膽草甘菊羚羊角桑皮山梔案一女五歲痘後九月右眼胞下微腫多眵多淚且紅爛乃脾家之病當多汗問之果然因痘後失於調理脾虛氣弱腠理不密外邪易入用當歸六黃湯以實腠理發時以荊防菊蔓翹荷之類以散表邪黃連黃芩生地黃熟地黃黃耆白芍山楂地骨皮新會皮蜜丸案一兒痘後失藥調治又值炎天蘊熱摶肝斑瘡入目身多瘡疥金銀花連翹當歸白芍川黃連天花粉木賊穀精膽草密蒙花望月砂案一兒於夏間左眼胞下生瘡及眉毛至十月終復感風熱致目紅腫不開防風荊芥薄荷葉淨蟬退陳皮楂肉甘草案一兒五歲左目微腫羞明下淚由肝火熾盛而然與五疳丸十丸空心米飲下投以後方白朮茯苓山楂川黃連白芍藥膽草骨皮案一兒患積症目夜不明腹微痛川黃連龍膽草山楂麥芽陳皮小青皮茅蒼朮白朮當歸青黛使君肉豬牙皂殭蠶為丸白湯下案一兒疳積目有紅翳龍膽草山楂麥芽建神麯白芍川黃連當歸白朮紫厚朴香附案一兒痘後有紅翳陳皮茯苓蟬退川黃連白芍藥連翹甘草案一兒眼胞微腫夜多啼哭咳嗽痰涎蘇葉荊芥防風薄荷葉杏仁泥楂肉陳皮前胡桑白皮案一兒腹中痛眼上稍有紅翳此疳積也雞肺散案一童十五歲羞明畏日不能仰視者二年矣屢投瀉火清肝致面黃羸瘦豫脈之兩尺浮大此腎水不足心火炎上法當壯水之主以鎮陽光六味丸加人參甘菊密蒙花案一女十五歲患目赤有云翳羞明畏熱心火上炎兼肝鬱所致法當抑火之源生地當歸白芍川黃柏甘菊花陳皮黃連柴胡龍膽草穀精珠甘草案一兒未滿百日兩目忽然流血他無所苦惟羞明眵淚此內火偏旺兼食病乳乃心肝脾受病經曰五臟六腑之精氣皆稟受於脾而上注於目首為諸陽之會目乃血脈之宗今內熱既盛又加以風熱上壅則循空竅而上溢於目矣宜涼血清熱陳皮赤芍生地粉丹皮川黃連膽草案一兒斑後餘毒未解上攻於目有翳由肝木偏旺脾土受困致泄瀉繼起宜祛風明目佐以實脾使清陽之氣上升則濁陰自歸下竅目明而瀉自止矣升麻黃耆青防風川芎軟柴胡車前茯苓枯黃芩蘇木元紅花陳皮甘草石決明孫用和傳治白珠有紅翳侵睛方白菊花八兩甘枸杞四兩生地五兩杜蜜二斤取一磁瓶湯煮一滾置蜜於瓶內投上三味於蜜中攪勻封固隔水煮二晝夜水少頻頻添之瓶口將石壓定日用軟柴夜用硬柴令不間斷煮畢取起置一缸內盛水鋪磚於內置藥瓶於磚上出火氣七日可用滾水任意服之食盡紅翳自退良有效驗耳症案一兒左耳腫痛膿汁壅塞此腎經有熱也用蔓荊子湯加減治之蔓荊子丹皮赤芍連翹仁木通川黃連甘菊桑皮案一兒耳出黃膿身微熱脾胃有積兼熱氣上衝所致陳皮山楂麥芽桑白皮白甘菊甘草乳蛾口疳案一兒晝夜啼哭喉中紅腫此乳蛾也用鵝羽攪之吐出痰涎碗許用龍膽草為末吹入而愈案一兒忽然喉音不清此熱鬱於內復感風寒所致知母黃柏黑元參天花粉前胡桔梗甘草案一兒上唇尖腫起突出此必發一熱毒宜消散為善防風荊芥大力子薄荷葉連翹黃芩山梔黑元參粉甘草案一兒忽口角歪斜乃陽明胃熱與脾濕相併而成宜祛風劫痰殭蠶白附子明天麻獨活防風半夏陳膽星龍膽草陳皮山梔桔梗薄荷葉甘草案一兒口疳用犀角汁和梨汁服之外用硼砂冰片寒水石青黛為末吹之亦治木舌重舌喉痹神效結核案一兒初生兩月項下有核如彈堅著不移身熱此內有胎熱兼之衣被太厚外為風邪所遏宜祛風清熱柴胡薄荷前胡大力子江枳殼陳皮元參黃芩連翹仁案一兒患症如前服前藥稍減因藥間斷復紅腫欲潰當歸川芎貝母皂角刺金銀花連翹桔梗又潰後即前方加人參間服滋養之劑而愈案一兒左邊太陽有核如彈半年不愈醫用灸法數日而大如雞卵用敷藥而漸大如覆杯用降藥以欲其腐去致形如翻花膿水不幹飲食不入面色無神四肢浮腫因思立齊云瘤者留也隨處凝滯皆因氣血乖違臟腑受傷當治其本大抵屬肝膽二經者多宜養氣血清肝火人參白朮雲茯苓炙甘草生地歸身山梔龍膽草服後瘡口翻突臭腐難近小便閉飲食不進兼間有積滯腹痛皆由脾氣敗壞所致恐醫藥難挽人參白朮雲茯苓綿黃耆肉桂米仁木通淮山藥痿症案一女右手痿弱不能舉動面發瘰此脾肺濕熱所致黃芩川黃柏茯苓地骨皮案一兒五歲面色萎黃兩足軟弱不能步履據述平時飲食不節屢受風濕脾氣損傷肺失所養致濕邪阻滯氣分宜健脾消食清熱利濕茅蒼朮焦白朮山楂麥芽陳皮粉豬苓建澤瀉木瓜牛膝川連揀麥冬緑升麻瘡瘍案一兒患瘡久久下部更多身熱自汗食少腹實由瘡久氣血耗損復感風邪荊芥防風連翹金銀花川黃連陳皮茯苓山藥又連翹白芍銀花生米仁細木通甘草案一兒歲許頭瘡耳後發一小毒微腫胎毒所致大力子荊芥連翹淨銀花花粉黑元參桔梗甘草山梔木通桔梗連翹仁粉甘草又大力子枳殼貝母銀花赤芍藥黑元參案一兒項有結核如豆大後發壯熱喉下腫起高突咽喉閉塞不能飲乳先以鵝羽探吐痰涎次服煎劑陳皮枳殼黃芩連翹仁青防風前胡瓜蔞桔梗黑山梔龍膽草蘇子又貝母元參花粉江枳殼新會皮前胡海藻夏枯草案一兒咽喉左邊腫痛有核此由衣被太厚常近火側多食炙煿痰火內鬱而成也若失治恐成癭瘤柴胡前胡大力子黃芩新會皮枳殼元參炒殭蠶花粉嫩桔梗案一兒頰下患結核身熱痰嗽前胡貝母桑白皮黑元參桔梗花粉連翹江枳殼夏枯草陳皮杏仁案一兒歲許眉間發瘡令煎花椒湯洗之大力子荊芥銀花花粉川黃連川黃柏蟬退木通甘草又明礬五錢入蔥管內煨龜板五錢酥炙為細末菜油調敷案一兒患瘡小水赤澀此濕熱所致銀花連翹木通生山梔川黃柏山楂甘草案一兒痘後生瘡癤赤茯苓貝母淨銀花赤芍山藥川黃連米仁連翹細木通甘草案一兒遍體疥瘡皮膚濕爛銀花連翹何首烏焦茅朮黃柏殭蠶蟬退粉甘草案一兒瘡後咳嗽有痰唇紅銀花桔梗陳皮建神麯川黃連木通鉤藤甘草案一兒病後身上生瘡面白神倦小便不利防其發腫白朮茯苓淮山藥生米仁澤瀉赤芍連翹細木通金銀花煎膏服案一兒遍體生瘡浮腫咳逆氣促兼外感風邪桑白皮枳殼蘇子新會皮前胡青防風木通杏仁葶藶子豬苓建澤瀉案一兒患瘡潮熱陳皮當歸赤芍赤茯苓楂肉炭黃柏知母元參淨銀花軟柴胡甘草案一兒遍身瘡瘍頭上瘡蓋甚厚此胎中熱毒所致不宜湯藥熏洗恐瘡毒入腹為患不淺也犀角解毒丸案一兒頭上發狗癬疥身熱痰鳴此外感風邪所致先解其表葛根荊芥新會皮細木通楂肉服二劑後外邪已散用銀花連翹陳皮木通甘草煎膏服以解其毒案一兒狗癬疥頭額甚多膿水淋漓肚腹實殭蠶山楂麥芽川黃連紫厚朴陳皮甘草齒痛案一兒身熱齒痛此風熱客於陽明也薄荷葉荊芥防風陳皮川黃連粉丹皮甘草燈草石膏案一女左牙床腫痛發熱右頤紅腫陽明蓄熱所致防風通聖散加減治之荷葉連翹大力子元參桔梗青防風山梔飛滑石石膏銀花粉甘草案一童齒縫出血不止此由元陰不足相火妄動而乘於陽明也滋陰藥中加丹皮童便甘草案一人血虛齒痛升麻石膏丹皮枯黃芩小生地當歸陳皮甘草附案一兒臂痛不能舉手足或左或右時復轉移脈沉細此中脘有停飲脾氣不行故上攻於臂也宜治痰為主半夏二兩茯苓一兩江枳殼五錢風化硝二錢五分用薑汁煮麵和為丸桐子大每服三十丸薑湯下案一兒項痛足軟牙血面色萎黃此風濕客於三陽傳入足太陰經濕久生熱所致元參天花粉連翹防風荊芥穗薄荷大力子石膏滑石淨銀花桔梗甘草小便不通用荊芥二兩大黃一兩大便不通用大黃二兩荊芥一兩小便不禁肺氣虛也宜安臥養氣以參耆之類補之有熱加黃柏生地濕癬用陳皮山楂麥芽豬苓澤瀉川連茅朮白朮木瓜牛膝茄皮案一兒項軟喉中有痰諸醫以天柱骨倒而用人參余竟以風藥治之而效陳皮殭蠶明天麻藁本黑山梔黃芩茯苓粉甘草癬方用土槿皮五錢大黃五錢斑蟲十個密陀僧五錢燒酒半斤浸一日擦患處頭上肥瘡用松香淘丹橄欖核煅研末將鮮油一塊鋪青布上入松香卷緊扎住用火燃之滴入鍾內取灰燼並橄欖核灰淘丹一併交融去火毒搽之頭上禿瘡用左旋龍一兩瓦上煅花椒四錢硫黃三錢紅砒五分共研和將蔥頭甘草水洗淨麻油調敷走馬疳方用川連一錢人中白四錢硼砂三錢雄黃二錢青黛三錢橄欖七枚煅冰片一分自孝竹箬二葉燒灰共為末應用神效
