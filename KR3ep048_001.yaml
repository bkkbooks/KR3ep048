body:
  text: 卷上初生雜症案一兒十九朝至夜多啼腹中痛漉漉有聲面色紅赤舌腫耳脹口頻撮起如魚吸水此胎熱而兼驚也宜兼治之鉤藤川連連翹小生地粉丹皮赤芍甘草燈心煎一小杯隨服二三匙徐徐下之案一兒生月餘身發微紅細瘰多啼腹鳴亦驚熱也川連連翹生地嫩鉤藤白芍藥銀花甘草案一兒初生聲啞面黃兩目腫大小溲閉手足逆冷胎熱無疑投涼劑薄荷葉連翹大力子桔梗甘草川黃連荊芥根生地木通黑梔燈心草案一兒兩目多眵痰壅氣急手足牽引二便閉澀有時掣跳目微斜視宜散風清熱荊芥防風根生地川黃連當歸連翹山梔細木通西赤芍甘草案一兒三日不大便多啼不寧以蔥管探入穀道遂去焦黃糞投後劑而安川黃連連翹黑山梔陳皮木通粉甘草案一兒面紅足屈伸不已此由胎中有驚熱風火相摶神魂不守故有此症川黃連連翹山梔木通新會皮小青皮鉤藤甘草案兒大便艱啼哭不已乳母云始生二日下焦黃糞少許隨後每大便則啼哭不止甚至臍突兼之身發紅瘰耳左發一紅泡啼時兩足屈伸不已余謂症屬肝經受胎之時當有惱怒所致宜疏肝清熱為主防其發驚後月餘果發急驚而死川黃連連翹生地木通鉤藤鉤小青皮甘草案一兒初生遍身發瘡成片潰爛此係胎中感熱熱毒蘊釀而成清涼解毒為主荊芥防風連翹川黃連大力子元參木通蟬蛻川黃柏淨銀花甘草案兒月餘遍身發微紅細瘰宜清涼解毒兼調乳母不可使用敷抹之品恐毒無出泄入腹尤甚也生地川連銀花粉甘草又荊芥防風連翹黑元參天花粉黃柏木通銀花燈草乳母服案一兒初生面色㿠白腹上青筋脹急喉間厄厄有聲此由産母喜食生冷寒氣侵兒臟腑所致宜溫平之劑木香炙甘草延胡索鉤藤乳香厚朴案兒三四月許身面俱黃鼻凝血跡發一青紫塊於口旁夜多啼哭煩躁醫以疸治之不效余意須涼血清熱其黃自退諸症當次第而愈病家初不心信服之果效當歸生地川黃連白芍藥連翹陳皮鉤藤細木通粉甘草服二劑見形色和平黃亦減半至第三日口內上齶紅腫即前方加桔梗花粉案一兒二三月許睡中聞雷輒驚啼不止身曲傴僂氣不舒暢時又外感咳嗽有痰宜寬氣利驚兼解表消痰鉤藤甘草江枳殼陳膽星前胡陳皮蘇葉青防風案一月外小兒面黃身熱小便赤澀時當炎夏服六一散而愈案一兒六七月許忽夜啼不止額帶青色投以後方不再劑而愈新會皮枳殼赤芍藥鉤藤川連粉甘草案一兒歲許睡臥不寧啼哭時作先服紫金錠一丸隨服後方二劑而安新會皮厚朴白芍藥青皮蟬退粉甘草案一兒數月面發微紅細瘰此風熱所致散之自愈荊芥防風新會皮江枳殼木通甘草案一兒甫月餘賦稟瘦弱面黃多啼兼瀉新會皮鉤藤赤茯苓木通甘草兒較前賦稟稍厚又長月餘症患相似但不為殊耳前方去茯苓加枳殼又小便不利加澤瀉燈心案兒六七月許遍身發黃腹脹氣急兼微熱往來時當夏令必暑邪內伏以祛暑寬腹利水之劑五劑而安香薷川黃連青皮厚朴大腹皮木通茵陳蒿赤苓澤瀉生薑衣案兒初生喉舌腫脹乃熱毒鬱於心脾用竹瀝浸黃柏時時點之以犀角丸加減服之元參花粉桔梗川黃連大力子連翹赤芍木通當歸身根生地黃柏犀角甘草案一兒歲許自臂紅腫過一夜即遊走兩脅此赤遊丹毒也延外科砭治進以後劑元參桔梗大力子薄荷葉花粉荊芥防風案一兒喉旁腫脹乳飲不下總是胎中素受熱邪生後復感外熱痰壅氣滯郁遏於喉間宜涼膈散加減治之荊芥防風薄荷葉川黃連木通花粉甘草如初起只宜表散不可專用寒涼凡小兒先有胎熱復外感濕熱內外熏蒸煎熬陰血血得熱自然流散妄行遊走肌膚片片若紫霞狀若毒盛熱甚可與外科商之砭去毒血隨服解毒之劑惟百日內兒不可砭以其肌肉柔嫩難任耳元參桔梗川黃連荊芥青防風赤芍薄荷淨銀花連翹案一兒囟門下陷大都得於先天不足氣血兩虛不能上充腦髓是以成坑耳宜補氣助脾為主人參白朮茯苓淮山藥新會皮炙草為末量兒大小服之案一兒五月許陰囊潰爛面黃身疥腹實煩啼總之胎熱驚毒延外科治之陰囊瘡疥俱愈煩啼亦減第不可多進寒涼恐腸胃得寒凝滯作痛耳赤芍藥木通鉤藤川黃連連翹淨銀花案一兒初生口有白屑面黃身熱煩啼不寧亦胎熱而兼盤腸吊痛也宜兼治之赤芍藥生地鉤藤新會皮黃連粉甘草如腹實加枳殼腸鳴身曲傴僂加延胡重舌雪口加連翹木通丹皮遍身有瘰如疥加黃柏案一兒三月許鼻凝血跡面黃腹微實多啼不寧此胎熱而兼盤腸驚也新會皮枳殼黑山梔鉤藤木通粉甘草案一兒歲許肥白有火有痰服消痰解熱之劑症已將愈復發遍身瘡疥小便不利並耳後有一痰塊形如小癤總以胎毒乘熱勢而發於外也元參桔梗花粉黑山梔細木通前胡甘草連翹江枳殼新會皮如耳後痰塊不消加貝母案一兒向有胎熱發黃調治愈後繼之身熱遍發青塊痰鳴氣促兩目眥上下唇皆有血水舌紅腫由內有蓄熱外感暑邪所致清熱解毒為主新會皮江枳殼黃芩花粉山梔川黃連麥門冬香薷甘草凡治失血症而用陳皮枳殼正以折其炎上之勢耳胎病案一兒始生二月遍身發黃更兼壯熱作止有時似乎瘧疾數日後腹大臍突面黃更甚熱勢未減此名胎黃法宜利水道而佐以寬腹助脾之劑乳母亦宜戒氣並服煎劑為妙川黃連建澤瀉茯苓木通香薷淮山藥紫厚朴青皮陳皮茵陳大腹皮生薑衣案一兒胎毒綿延已久元氣損壞極矣急當解毒藥中兼養血為主乳母亦服煎劑當歸生地黃連細木通連翹仁人參甘草地丁金銀花淨蟬衣案一兒數月肛門與陰囊患紫片此因胎毒流於大腸更兼浮腫痰多慮其發驚宜清肝解毒陳皮枳殼鉤藤陳膽星淨蟬衣桔梗荊芥木通明天麻黑元參犀角川連延胡案一兒生四月患胎瘡頭面更盛肢體肥壯咳痰氣急慮其發驚宜疏肺順氣消痰為先解毒次之陳皮枳殼前胡熟蘇子瓜蔞仁桔梗杏仁鉤藤陳膽星案一兒胎熱兩目腫痛二便不利頭面手足悉冷聲啞面黃薄荷連翹大力子荊芥穗甘草桔梗生地川黃連黑山梔木通案一女甫月餘肚腹堅硬囟門作腫身熱氣粗舌腫塞口不能吮乳病甚危急宜審緩急以治之先用芒硝一錢青黛五分硼砂六分冰片三釐共研細擦之其舌漸小乳雖不能吮而滴入口中者已能咽矣隨用三黃丸磨服大便下如稠膠者三四次是晚便能乳能睡腹脹亦減但熱未除囟尚腫手足微掣以煎劑連服二日而諸症平復鉤藤枳殼新會皮木通川黃連黃芩膽星案女月餘夜啼不止四五日後發火灼瘡於下部壯熱煩躁嘔逆不乳因胎中感母氣之血熱外則衣被過厚夾攻而成此症也其瘡以熟菜油潤之宜清熱解毒為主大黃黃芩川黃連江枳殼甘草木通赤芍服後大便通利熱未除灼瘡更甚加紫草犀角二劑而愈案一兒夜啼不止數日後發火灼瘡於左臉腹堅叫號不已延外科用磁砭其患處出紫黑血隨用涼血解毒之劑木通生地荊芥江枳殼西赤芍犀角甘草連翹大力子服二劑加黃連黃芩因稟氣薄不用大黃每日砭其毒盛之處數日方得挽回又服滋養元氣之劑數日而痊案一兒向患胎熱未除偶觸遂發熱面黃神倦羸瘦少食此係胎熱內郁防有口疳唇燥之症須用犀角地黃丸而痊當歸橘紅連翹川黃連粉丹皮白芍知母甘草烏犀角黑元參驚風總論驚風一症大抵由外感風邪而成者有因驚觸及聞聲響而得者亦有內熱生驚肝風心火二臟相摶而成者慢驚不省人事為其痰涎壅塞迷及心竅而然也急驚案一兒壯熱面赤目睛上視拳握口噤痰鳴氣喘不省人事此痰熱相侵風火相摶痰凝氣道有妨升降而然也投以豁痰寬氣截風定搐青防風紫蘇全鉤藤前胡天麻新會皮陳膽星木通竹瀝服後又進驚藥覺痰喘稍緩第煩熱面赤神氣不爽即前方加黃芩黃連殭蠶一劑而安案一兒患急驚口噤痰壅湯藥難入先以紙條蘸搐鼻散取嚏以通其關竅候牙關稍開復以薑汁少許探喉吐出痰涎碗許然後以祛痰定搐之劑投之而愈案一兒身多瘡疥睡中驚惕醫以驚藥投之不能奏效延余視之乃陰血為瘡疥耗損不能榮養肌肉主持筋骨耳豈可以驚治乎宜解毒為主佐以養血之劑一服而驚止三四服而瘡亦愈慢驚案一兒始由外感發熱不止繼增嘔吐睡則揚睛似睡非睡輒成慢症急用扶脾消痰防搐之劑幾其僥幸於萬一耳陳皮茯苓陳膽星明天麻甘草鉤藤殭蠶明日諸症稍減前方去天麻膽星加人參半夏案一兒初患嘔吐疑其轉乳竟嘔吐不止脾氣大虛此時速進參朮輩慢驚可免越數日始延醫調治不效邀余視之面色帶紅已知脾陰大虧陽無所附故浮越於外而然不久居之象也一醫不解猶云可治余辭不治主人強藥勉擬後方投之越三日而卒陳皮茯苓人參明天麻炒殭蠶鉤藤甘草案一兒水瀉三四日不止作渴喜飲面色無神手足逆冷將成慢驚急以實脾利水之劑投之白朮茯苓淮山藥新會皮甘草車前豬苓澤瀉厚肉桂服一劑稍減即前方去肉桂加人參五分案一兒身有瘡瘍將成慢驚投後二劑而愈陳膽星新會皮枳殼檳榔竹瀝西牛黃法半夏蘇子甘草案一兒嘔吐七日不止已成慢驚白朮法半夏白茯苓陳皮甘草鉤藤淮山藥服一劑後又加人參五分案一兒素稟嬌弱自幼曾患驚風服藥愈後因飲食不節脾胃受傷以致積熱未除面色痿黃腹痛時作脾胃缺實肌膚瘦削口角微邪此心經受熱脾家有風二陽相鼓風火相摶之症急宜清熱養陰庶日後無癲癇之患天麻膽星川黃連新會皮枳實殭蠶防風黑山梔龍膽草當歸茯神遠志白附子煉蜜為丸每服一錢案一兒壯熱煩躁汗出不止服藥已愈食飯太早發熱煩躁更甚遂至目睛少神鼻竅開張痰涎壅盛狀似驚風淡豆豉新會皮膽星鉤藤牛黃黑山梔案一兒身熱僵仆昏沉不醒目睛上視六脈弦而帶數此痰涎稠黏膠固痞塞不通榮衛之氣不能流行狀似瘧疾又似急驚不可不辨一友以痘候治之且云今晚必見標矣是晚即涼明午又發豫以消痰丸並進以消痰祛風之劑不再發而愈若作痘治誤矣陳皮法半夏陳膽星防風青皮枳殼草果仁粉葛根檳榔柴胡黃芩案一兒身熱兩日每辰至酉即涼第三日發熱至未忽然兩目上視手足搐掣哭不出聲此變瘧之候因感邪太甚拂鬱於內未見其先發寒耳若以驚風治之則誤矣豫投以消痰理氣散邪之劑明晨果戰寒發熱顯然是瘧矣陳皮膽星法半夏青防風柴胡前胡青皮江枳殼粉葛根黃芩又陳皮膽星法半夏軟柴胡青皮黃芩茯苓尖檳榔草果仁案一兒外感將愈曾患吐瀉醫不知其傷食之故故乃云防其變為慢驚令多進米食且以參術補之遂腹痛煩躁身熱如火舌上白苔汗出不止此本得之傷食挾暑又誤服參耆無怪其疾之愈甚余以香薷飲加山楂枳實石膏二劑而痊案一兒壯熱五六日不止困倦弄舌咳嗽氣促亦是時瘧若不解散恐熱久變成驚風也薄荷陳皮枳殼紫蘇葉黑元參桔梗黃芩黃連淡豆豉粉甘草案一女先作吐後水瀉不止面色㿠白兩目露睛吁氣昏睡手足厥冷此脾胃俱損真陽消耗陰邪獨盛之候速宜溫補脾胃尚無僥幸人參白朮茯苓炙甘草廣木香肉果木通白芍案一兒生五十日氣促咳嗽痰涎壅盛目睛上視哭不出聲俗名肺風痰喘此因內有熱而外有風郁遏而釀成此症與驚風相似但手足不搐掣為殊耳綿延日久變成驚風不治者多矣先投滾痰丸二錠定後方服之防風前胡陳皮紫蘇子葉甜杏仁枳殼黃芩桑皮又服定喘消痰利驚防搐陳皮枳殼蘇子陳膽星黑元參前胡桔梗蔞仁天花粉枯黃芩鉤藤竹瀝牛黃案一女未及周歲身熱夜啼時多煩躁多汗神昏不省人事兼之痰涎壅塞驚之兆也此內有積痰外感風寒所致宜清火散風火清而肝平肝平而風熱自退紫金錠柴胡防風前胡新會皮法半夏枳殼黃芩膽星鉤藤鉤案一兒曾以食傷脾胃故稍有所感便昏僕不省手足微搐嘔吐三四日俟大便通後始得蘇醒稍進飲食此由胃家不能遊溢精氣脾家不能運化精微脾胃兩虛其氣有升無降壅遏不通故有此症當專理其脾胃一切寒涼克伐在所不宜庶日後無虛癇之患人參白朮茯苓半夏曲新會皮甘草天麻鉤藤川黃連龍膽草楂肉案一兒目睛上視哭聲不清手足搐掣但喊哭肚上起塊此名奔豚宜順氣消痰防驚之劑橘紅膽星鉤藤熟蘇子桑白皮黃芩前胡枳殼黑元參嫩桔梗第二日後痰涎壅塞啼不出聲舌強不能吮乳已成慢驚遂用赤足蜈蚣一條蠍尾薄荷湯洗淨焙乾蒲黃末等分白湯送下案一兒十六歲心經有熱睡臥驚惕以天王補心丹加減治之生地當歸茯神酸棗仁麥門冬人參白芍元參肥知母石菖蒲黃連甘草白芍藥蜜丸案一兒身熱咳嗽喉中痰鳴發搐前胡蘇子杏仁新會皮江枳殼防風桔梗桑皮陳膽星案一兒因發熱之後變為慢驚喉中痰響眼半開半合唇面俱紅乃虛火炎上故也且以手操其筋根毫不知痛掐入人中稍知痛癢痰涎壅滯神脫之兆也決不可治勉擬竹瀝牛黃新會皮法半夏人參服後病勢不減痰涎如故必死無疑矣案一兒瘡後變為慢驚眼半開半合操其筋根稍知痛癢用竹瀝牛黃痰涎稍減又身上生瘡防其瘡毒入腹故雖屬虛症不可用參牛黃竹瀝膽星新會皮法半夏檳榔枳殼薑汁案一兒面色青曾發搐二三次慮成癇症投祛痰清火平肝之劑天麻殭蠶川連江枳實鉤藤鉤膽星陳皮法夏粉甘草蜜丸案一兒傷風因嗜麵食遂致發熱不止目睛上竄面青舌白似睡非睡脈洪而無力胸膈尚滯泄瀉無度乃胃虛不能運化故也不可純用消導人參廣皮楂肉法半夏陳膽星麥芽鉤藤白芍滾痰丸一枚案一兒壯熱七日痰壅氣喘腹大堅小溲不利鼻有黑色虎口紋紫黑舌乾煩躁宜順氣消痰清熱新會皮楂肉江枳殼蘇子膽星葶藶子鉤藤黑元參牛黃竹瀝案一兒歲余面色青慘多痰泄瀉乃脾虛不運肝木來侮之象也人參白朮茯苓法半夏新會皮澤瀉淮藥炙草案一兒三四歲身熱痰喘睡中時常坐起此積熱生風也祛痰消積為主前胡桑白皮桔梗廣皮川黃連楂肉黑山梔黃芩知母白芍藥當歸粉甘草諸熱總論六脈細數病在心腎夫童男讀書傷於心部並及其腎何耶大凡虛損之疾不獨一類丹溪云喜怒不節起居不時飲食失宜一有所傷皆損其氣氣衰則火旺火旺則乘其脾肺脾肺虧損則不能滋榮百脈而諸證蜂起為潮熱為短氣為腳軟為咳嗽為倦怠為血痰為浮腫為惡熱惡寒或寒熱交作或脅痛或嘔吐痰沫或不能睡或不思飲食或飲食不為肌膚一皆虛損之候也大忌寒涼克伐之劑宜養正為先通用人參黃耆知母新會皮地骨皮秦艽柴胡鱉甲白茯苓當歸身生地白芍潮熱不發於晝而發於夜此陰分受傷也故用歸芍地黃為佐氣有生血之功血無益氣之理陽生則陰長故用參耆為君其他如鱉甲知柴皆制肝滋陰扶所不勝耳貝母半夏不過解鬱健脾消痰無痰則去之若嘔吐痰沫屬腎虛水泛者非二藥所能治宜地黃膏時時服之則愈且此膏與前藥並行而不背者也附加減於後脾胃不實加白朮暫去歸地熱不止加青蒿心虛加茯神棗仁食不化加山楂痰嗽加半夏曲乾渴加麥冬五味汗多倍黃耆棗仁浮麥湯煎藥疳積案一兒面黃腹脹溲白如泔此熱氣使然也觀水體清而火體濁是可辨也陳皮楂肉紫厚朴川黃連白芍木通澤瀉案一兒面色黃萎時嘔清水腹痛止作有時此蟲積也前方加檳榔烏梅川楝子案一兒三四歲疳積久而不愈面黃腹大手足心熱四肢瘦弱服二三十劑未即見效以積症無近功也陳皮山楂麥芽川黃連銀柴胡知母骨皮白芍案一兒面黃腹大睡中不時啼哭非實有驚也因飲食不節脾胃受傷所致宜和中消食為主案一兒歲許母亡缺乳哺飯太早耗傷元氣面色痿黃身體羸弱又感風寒峻投發散恐有犯虛之戒柴胡荊芥知母地骨皮江枳殼陳皮楂肉甘草案一兒三歲唇紅煩躁項不能舉小水不利眼白帶紅四肢瘦削作渴喜飲此乃疳家之甚症無成法可准因病家強藥權以後劑投之陳皮茯苓川黃連地骨皮澤瀉芍藥楂肉案一兒腹實且熱兩目羞明微有障翳此名肝疳以雞肝散服之兼服消積藥中加池菊穀精膽草案一兒腹微痛兼潮熱往來由傷食兼飲熱乳所致消積藥中加知母地骨皮青皮案一兒善食腹大身熱面黃泄瀉眼眨不已至夜不明余謂競攻其積恐脾胃愈損宜消補兼施並治其目陳皮楂肉川黃連芍藥白茯苓白朮蒼朮穀精草燈心又服五疳丸數丸調理半月而愈案一兒五歲左目微腫羞明淚出乃脾火熾盛而然也先服五疳丸十丸空心米飲化下接服肥兒丸十丸再服後藥而愈白朮茯苓山楂肉地骨皮芍藥膽草川黃連山藥蜜丸案一兒五歲兩目至夜不明腹中微痛定後方服之黃連山楂龍膽草陳皮炒麥芽青黛干蠶使君肉青皮焦白朮茅朮牙皂蜜丸案一兒數歲素有食積復因跌撲腹痛欲死川楝子檳榔楂肉麥芽石菖蒲楝根皮搗汁入煎服前方又投以烏梅湯大便下如瘀血者二三次痛又稍減加桃仁當歸陳皮紅花一大劑進之甚效再以前方去檳榔楝根皮調理半月而安案一兒七歲有口渴面黃腹痛等症因食冷粉團起乃蟲食兼致而然先與香稜丸十服再進後丸藥廣皮川連麥芽紫厚朴地骨皮白朮青皮楂肉建神麯使君肉川楝蜜丸空心服二錢臨臥再進一服案一兒六歲由平時飲食不節致傷脾胃泄瀉作腫咳嗽氣急此為脾虛不能生肺金經曰上盛下虛此之謂也人參白朮茯苓淮山藥煨肉果澤瀉桔梗為末另用車前三錢煎湯去渣調藥末一錢案一兒喜食茶葉乃蟲症也廣皮楂肉建神麯紫厚朴麥芽川連白朮雲茯苓川楝子蕪荑甘草另取花椒四兩茶葉二兩令炒汗出去椒食茶葉令盡當愈後果驗案一兒面黃腹實飲食少進陳皮山楂麥芽川黃連紫厚朴神麯白朮甘草胡黃連白芍藥山藥蜜丸又黃連知母地骨皮白芍藥山楂白朮山藥龍膽草新會皮香附蜜丸案一兒向有積熱骨蒸之患綿延日久飲食不節起居失時損傷胃氣面色萎黃身熱不止泄瀉腸鳴腹脹食減困倦盜汗精神懶怯身體羸瘦此皆由脾氣敗壞不能運化精微積滯膠固而然宜制肝補脾兼消積清熱方得全愈若專攻其積恐犯仲陽內亡津液而成疳之句也陳皮芍藥楂肉川黃連肥知母地骨皮白朮茯苓麥芽軟柴胡炙鱉甲秦艽厚朴香附連服六劑較前稍減但積熱未除元氣未復當於大補之中兼清熱消積人參白朮茯苓綿黃耆地骨皮楂肉陳皮黃連白芍藥薏苡米蜜丸案一兒六脈細數肌膚羸弱面色不榮脾胃缺實兼之腹痛氣滯等症乃肝木侮脾土所致當補脾制肝清心庶日後無積熱瘧痢之患陳皮楂肉芍藥白茯苓於術炭黃連膽草山藥白茯神焦茅朮棗仁麥芽蜜丸案一兒素稟嬌弱向有積熱未除每交夏令常覺飲食少思五心煩熱冷汗如雨身體瘦弱骨蒸潮熱宜補氣血藥中兼瀉火養陰日後無虛損之症也生地當歸茯苓秦艽肉炙鱉甲陳皮香附黃連銀柴胡地骨皮知母白芍案一兒十四歲患骨蒸勞熱之症頭眩作渴胸膈飽悶腰疼足軟六脈細數此皆心火消爍真陰陰氣消耗陽無所依以致浮散於肌表之間故成此症經曰陰虛發熱是也宜滋陰養血血旺而陽氣自制矣生地當歸川芎白芍藥麥門冬香附秦艽知母銀柴胡軟柴胡丹皮案一女面色痿黃兼青色胃脘作痛此由內有積熱兼之惱怒所致青皮檳榔楂肉江枳殼臺烏藥香附麥芽桔梗案一兒十四歲患積熱頭眩此火在上痰在下火動痰升故也宜導心經之火祛肝臟之風陳皮黃芩黃連龍膽草白芍藥防風川芎黑梔半夏曲明天麻茯苓楂肉水泛丸案一女飲食太過腸胃受傷骨瘦如柴泄瀉無度漸成丁奚宜實脾消積陳皮厚朴山楂川黃連肉豆蔻麥芽白芍茯苓於術炭案一兒向有積熱未除更兼外感身熱稍緩唇焦汗出睡臥不寧此表裡俱病宜和解清熱消積陳皮山楂麥芽江枳殼黑山梔柴胡黃芩第二日身涼但唇焦未痊陳皮山楂黃芩川黃連白芍藥連翹骨皮當歸案一兒蟲積下後肌膚有熱愛食乾糧唇紅作渴而嘔此脾陰受傷肝火熾盛久成疳勞宜預防之芍藥骨皮大腹皮茯苓建澤瀉白朮烏梅案一兒向有積熱骨蒸之患今遇勞即發久而不治必成疳勞陳皮山楂芍藥川黃連龍膽草柴胡秦艽知母地骨皮炒麥芽案一兒內有積熱蘊釀以致肌肉日漸羸瘦手足逆冷而大便五六日一次皆因脾陰不足若用涼劑恐犯形寒飲冷之戒當歸生地白芍川黃連紫厚朴麥芽案一兒肌膚瘦削大肉盡去內熱頗甚更兼痰涎壅盛雖未泄瀉已成危症且以助脾消痰退熱之劑進橘紅茯苓貝母山楂肉川黃連麥芽前胡芍藥銀紫胡案一女八歲身熱不已面色萎黃四肢無力精神減少兼之瘡瘍兩足甚冷此積熱也宜清火養陰制肝補脾消積案一女面色無神夜發潮熱膝軟倦行脈息虛數此名積蒸骨熱若久不治必成疳弱知母秦艽陳皮山楂肉川黃連麥芽骨皮案一兒面黃腹實身熱微腫此食積作脹宜理脾退腫消食之劑陳皮山楂白朮川黃連建神麯茯苓麥芽厚朴淮山藥使君肉檳榔案一兒肚腹實痰嗽驚跳身熱此積熱而兼外感也陳皮山楂麥芽熟蘇子紫厚朴前胡鉤藤柴胡肥知母案一兒面黃額上毛豎此積病也香稜散案一兒患積熱又兼脅痛咳嗽柴胡青皮川黃連白芍藥知母陳皮山楂炒麥芽地骨皮桔梗前胡甘草案一兒十二歲患積病胃脘作痛身熱此積熱也山楂陳皮麥芽紫厚朴地骨皮芍藥甘草案一兒面黃腹實喉中痰鳴此積症而兼風痰也香稜散抱龍丸案一兒病後面色萎白頭項有核宜祛熱補脾消積燥濕之劑白朮茯苓蒼朮淮山藥新會皮山楂建曲案一兒素有積病又身上生瘡如圓眼大不作膿由積氣滯於脾胃所致宜消積之劑山楂陳皮麥芽紫厚朴川黃連銀花連翹甘草案一兒身面俱黃兼煩渴不止小水頻數如血乃食積傷脾兼濕熱相乘耳陳皮山楂麥芽紫厚朴建澤瀉木通黑梔川連茵陳蒿瞿麥案一女十二歲素有積熱右脈弦數左寸關洪數此心火爍肺之徵也故其為嗽為痰為骨蒸內熱宜清心火扶脾土為要案一兒素有積熱復感風寒邪傳經絡骨蒸潮熱四肢倦怠頭暈作渴心胸作痛睡臥驚惕乃飲食不節損傷脾陰故也法當清熱養榮制肝補脾陳皮當歸知母銀柴胡炙鱉甲麥冬人參茯苓白芍藥川黃連楂肉青皮秦艽淮山藥服後稍愈以時令炎熱議安神補脾人參白朮茯苓炙甘草酸棗仁山藥白芍川連銀柴胡地骨皮案一兒十六歲久有疳火身體瘦小時當夏令咳嗽唇紅飲食減少宜降火清金為要俟咳稍減再商元參花粉黃芩黑山梔天門冬麥冬川連桔梗新會皮案一兒向有食積身熱喘嗽曾服清脾消積之藥下柳葉蟲數條腹痛遂減交夏忽胸膈大痛痰喘如故肌肉消瘦此臟腑氣弱濕熱熏蒸漸成疳勞半夏陳皮檳榔青皮柴胡烏梅案一兒三四歲面色萎黃腹脹而熱牙床疳腐左頤下如敗卵此形氣雖虛因疳火炎上補則反壅而不散消積丸加減治之廣皮厚朴萊蔔子焦白朮楂肉芍藥大腹皮麥芽建神麯川連澤瀉又陳皮川黃連芍藥使君肉甘草楂肉焦麥芽白朮紫厚朴諸吐有虛有寒有熱有傷乳有風痰有傷暑有傷食案一兒久熱不已時見嘔吐此脾胃受傷兼之積熱蘊釀真陰消爍氣血因之耗損恐有慢驚之慮但痰熱內蓄未可竟補擬清熱養陰佐以扶元人參法半夏新會皮茯苓藿香川連地骨皮案一兒熱吐下利紅積面色萎黃更兼腹痛此食積下利也陳皮厚朴茯苓白芍藥青防風柴胡黃連木通建澤瀉粉甘草案一兒胸膈不寬嘔吐黃水此傷食而兼胃經有火也經曰胃膈熱甚則為嘔法半夏黃芩枳實麥芽枇杷葉山楂肉茯苓竹茹案一兒身熱頭眩噁心嘔吐黃水腹脹此先傷於暑復感風食而得也厚朴法半夏藿香新會皮香薷黃連黑山梔楂肉青防風案一兒痰嗽作吐陳皮半夏柴胡天花粉嫩前胡桑皮桔梗藿香青防風案一兒傷食作吐陳皮厚朴黃連法半夏山楂肉麥芽芍藥案一兒傷食感冒壯熱腹脹作吐陳皮厚朴山楂肉麥芽川黃連黃芩又人參白朮雲茯苓陳皮炙甘草澤瀉芍藥淮山藥案一兒吐不出厚朴陳皮山楂肉藿香法半夏乾薑枇杷葉接服調理方新會皮法半夏白芍茯苓白朮川黃連淮山藥案一女傷乳吐瀉新會皮紫厚朴生薑山楂麥芽法半夏案一兒四歲患耳疳久服涼劑致肌肉消瘦唇紅作渴嘔吐不食泄瀉以氣血先從耳疳而耗繼以寒涼傷其脾胃是以吐瀉並作也急用獨參湯進之俟吐勢稍緩再議按嘔吐最易損及脾陰脾主肌肉久吐不止自然肌肉不長元神虛脫虛火上炎火燃則水竭唇紅口渴勢所必至也速為調治庶圖僥幸人參茯苓廣藿香烏梅新會皮生薑案一兒吮乳即吐目慢神昏乃滿而溢非病也以濃米飲代乳一晝夜進後劑而愈陳皮法半夏茯苓鉤藤烏梅肉殭蠶廣藿香案一兒面白神倦吐乳不消余知多乳而兼傷冷溫胃為主陳皮半夏枇杷葉生薑廣藿香木香茯苓案一兒暴吐面紅作渴屬傷暑香薷厚朴川黃連建澤瀉豬苓案一兒吐黃水胸膈飽滿乃膈間有宿食胃中有伏火故也宜兼治之黃芩枳實陳皮炒山楂枇杷葉麥芽案一兒傷食服藥稍減又倍食以致停滯胃口不能運化腹痛欲吐而不能者二日香附新會皮山楂肉麥芽砂仁厚朴法半夏案一兒不節乳食吐不止斷乳服藥而愈但面白神倦喜睡安靜中氣猶未足也大補脾胃為主人參白朮白茯苓淮山藥藿香米仁車前建澤瀉案一兒吐後復瀉身微熱乃脾胃兩虛所致人參白朮淮山藥廣藿香生薑柴胡法夏粉甘草新會皮案一兒吐後唇紅面黃精神困乏微腫此水乘木侮之象吐傷脾陰故也實脾為主利水伐肝佐之白朮茯苓新會皮法半夏米仁木通芍藥淮山藥案一兒素稟怯弱因傷乳吐後精神困倦喜睡少食定後方以固其脾庶後無虛症之患也人參白朮薏苡米淮山藥炙草白芍陳米共為末白湯調服案一兒夏月傷暑夜啼不止諸醫莫療余問其大便通乎曰已三日不去矣用導法通之而安按此症如誤用紫金錠是以火濟火也醫者慎之案一兒感暑身熱嘔吐用藿香茶調益元散一服身熱稍減嘔吐未止白朮柴胡新會皮紫厚朴藿香香薷山楂粉甘草案一兒久熱不止時見嘔吐雖脾胃兩傷不可竟補因有痰熱內蓄外邪未盡耳宜清熱養陰之中兼佐止嘔扶元之劑人參茯苓新會皮地骨皮法夏黃連藿香反胃案一兒始以食積停滯下焦又感寒氣鬱伏於腸胃致朝食暮吐小腹實而大便堅經云朝人入出是無火也潔古云朝入暮出名下焦吐皆本於寒今脈息遲緩正合此症用溫胃順氣通便之劑陳皮香附法半夏紫厚朴檳榔丁香木香江枳殼服二劑後加桂三分吳萸五粒案一兒素有積症腹大而實至春患脾泄至夏飲食大減延至九月食積作嘔純是餿酸清水甚至水漿盡嘔干食可納此乃胃中有火膈上有痰氣逆者則㳅出清水連乾者盡吐火氣炎上故也經云諸嘔吐酸皆屬於火此兒向多怒氣因氣鬱傷脾怒結傷肝肝火炎上所致兼見大便堅小便澀皆鬱火為患未可溫補陳皮楂肉江枳殼白茯苓甘草青皮香附法半夏鮮竹茹泄瀉案一兒半歲許患泄瀉色黃而有沫將及月餘面色如常此吮母壞乳所致宜補脾順氣佐以消風白朮茯苓新會皮淮山藥米仁甘草木通青防風建澤瀉木香案一兒身熱腹實瀉而作痛此積症也楂肉陳皮厚朴白茯苓制香附白芍木通澤瀉細青皮服後病勢如故不敢過用克伐之劑恐成慢驚也木通澤瀉甘草雲茯苓嫩桔梗前胡案一兒腹實作瀉上午用參苓白朮散下午用四苓湯案一兒傷食作瀉肚腹膨脹新會皮柴胡萊蔔子楂肉防風芍藥豬苓建澤瀉赤茯苓麥芽車前案一兒久瀉不止肛門脫出此脾土衰弱真元下陷也經云實熱則大腸閉結虛寒則肛門脫出法當補脾而兼以升提人參白朮雲茯苓緑升麻楂肉陳皮芍藥淮山藥軟柴胡燈心如小便缺利加澤瀉車前盜汗加黃耆作渴加烏梅腹膨脹加木香案一兒水瀉不止用五苓散加芍藥木通廣皮案一兒白瀉後潮熱芍藥厚朴山楂肉新會皮麥芽澤瀉甘草川黃連煨肉果案一兒二歲身熱不食腹脹潮熱瀉後有積面黃身弱陳皮山楂萊蔔子紫厚朴麥芽香附川連大腹皮案一兒水瀉身熱四苓散加木通山楂肉軟柴胡葛根案一兒患傷食吐瀉理宜斷乳谷投以消導乃竟以寒涼雜進乳食以致身熱腹熱愈治愈劇仍以消食定吐為主陳皮厚朴山藥青防風廣薷香麥芽法夏服二劑後吐減熱除但面部腫滿投以參苓白朮散而安案一兒因乳食傷久瀉不止自汗睡臥不安神思困倦將成慢驚急當補脾寬氣以待胃氣之復陳皮山楂肉麥芽香附建澤瀉茯苓焦白朮芍藥肉果服後泄瀉稍減因脾氣困頓必須大理脾氣方可無虞人參白朮陳皮建澤瀉車前子茯苓案一兒四歲瀉久日十餘行間發潮熱唇紅作渴面瘦腹如鼓喜其善飯丹溪云善食而瘦者胃有伏火也若竟投參朮訶果必致不救當先用消食破積藥次投平胃散加茯苓川連楂肉建神麯焦麥芽兩劑而瀉減後以五疳丸調理而愈此係實證似虛不可防其慢驚而投以溫補案一兒因濕熱下流故四肢作痛今又腹痛而瀉陳皮山楂肉厚朴芍藥細青皮木通建澤瀉檳榔案一兒兩日前水瀉至第三日身發壯熱面赤唇紅防驚柴胡乾葛青防風荊芥新會皮前胡蘇子山楂肉木通案一兒久患骨蒸潮熱左脈無力右脈弱而細小泄瀉身疼手足麻木消瘦面色無神睡則盜汗遇食則脹此氣血損傷脾氣敗壞漸成勞瘵過用清涼恐損脾氣宜實脾啓胃白朮茯苓新會皮廣藿香香附黃連山藥甘草服後諸症俱減惟飲食仍脹而噁心內熱更甚此虛火炎上脾陰困頓而不能宣降耳白朮陳皮白茯苓川黃連桔梗秦艽山藥地骨皮廣藿香生薑案一兒水瀉不止手足冷作瀉此暴瀉損陰防變慢驚因尚有熱伏於內故未可驟用止瀉之劑辰砂六一散茯苓豬苓焦白朮建澤瀉川連防風木通案一兒不節生冷脾土有傷瀉下如木樨色日或一次或二次此係食積釀瀉以久瀉之後雖宜大補然積滯未盡不可驟用人參宜消補兼施白朮茯苓建澤瀉芍藥淮山藥厚朴陳皮粉甘草服後積滯稍減去厚朴芍藥加防風車前生薑又隔一日積已盡即加人參三劑而愈案一兒乳食過多久瀉不止自汗神倦慮其變成慢驚宜扶脾為主白朮陳皮香附白芍藥山楂肉肉果澤瀉服後瀉雖少減然元氣虛甚宜異功散加味治之人參白朮雲茯苓淮山藥甘草肉果澤瀉杜車前案一兒腹不痛水瀉不已神思困倦飲食不進經云水泄而腹不痛者是濕此因坐臥濕處恣飲水漿以致濕傷脾土宜燥濕健脾平胃散加味治之茅朮厚朴新會皮山楂肉甘草木通肉果案一兒泄瀉微有積身熱腹痛乃傷食而復感風邪所致宜兼治之柴胡防風山楂肉麥芽紫厚朴豬苓澤瀉杜車前服後熱退去防風柴胡又積盡除減厚朴加參朮茯苓山藥肉果四劑而安案一兒水瀉作渴此因冷熱相摶脾胃不和致陰陽不分四苓散加味治之白朮茯苓豬苓建澤瀉川黃連木通防風案一兒素啖生冷寒氣隔於腸胃遂洞泄不止六脈沉微法當溫補而兼利水止瀉之劑陳皮茯苓山藥杜車前建澤瀉煨姜肉果白朮炙甘草案一兒秋初暴瀉面紅口渴此傷暑而兼食積也香薷飲加減治之而安香薷厚朴川黃連新會皮麥芽甘草案一兒瀉後面白無神頭不能仰舉身熱作嘔因瀉久而元氣虛憊所致當專補脾胃理中湯加減主之人參茯苓炙甘草煨姜淮山藥藿香案一兒身微熱印堂青紅相雜夜臥不安泄瀉防風芍藥川黃連雲茯苓木通澤瀉甘草案一兒久瀉不止腸鳴小水不利飲食少進右脈按之無力左關弦長而數此肝木乘脾氣陷於至陰之所有克賊而無發生之意理宜和中溫胃回陽佐以分利水道使脾能健運再商後法人參白朮茯苓淮山藥炙甘草澤瀉乾薑升麻甜肉桂案一兒久瀉之後四肢虛腫肚腹作脹此土虛而不能制水故也當補中行濕利水兼理乳積養其正氣脾實則腫脹自愈若投峻厲之品多致不起人參白朮茯苓新會皮法半夏山楂肉厚朴木通澤瀉大腹皮案一兒瀉後腹脹足腫經曰脾主行氣於三陰脾傷則三陰之氣不行故驟然腫脹宜利水為主陳皮厚朴澤瀉杜車前大腹皮茯苓蘇子服二劑諸症少減再服實脾補元之劑而愈附啓脾止瀉丸凡久瀉不止可服此方白朮茯苓山藥訶子肉煨肉果扁豆木香龍骨赤石脂為末白湯調服二錢案一兒面赤少神瘦弱不時泄瀉咳有微痰乃脾胃虛而不能生金宜戒生冷避風寒投以六君子湯加味治之人參白朮白茯苓法半夏會皮山藥澤瀉炙甘草服後泄瀉未除此脾胃真元下陷也加乾薑以溫之柴胡以升之服後去柴胡加升麻肉果四劑而愈案一兒飲食不易消化胸膈脹便泄身熱此由飲食不節損傷脾陰所致經曰濁氣在上則生䐜脹清氣在下則生飧泄治宜升其清而降其濁而症自愈矣陳皮楂肉建神麯紫厚朴車前澤瀉枳殼青防風軟柴胡服二劑諸症減半進健脾利水之劑而痊愈吐瀉案一兒數歲始因食積一醫昧於衰其半而止之句峻用苦寒消導遂洞泄不止繼增嘔吐余謂吐瀉乃脾胃兩傷舍溫補別無他法以六君子湯投數劑而安案一兒吐瀉不止面白無神宜健脾養胃為主白朮陳皮茯苓紫厚朴廣藿香楂肉甘草案一兒吐瀉不愈唇紅煩渴目慢神昏投以實脾定吐之劑防風白朮茯苓白芍藥枇杷葉藿香車前澤瀉服二劑而吐瀉止又服參苓白朮散兩許而愈案一兒吐瀉交作身與腹俱熱醫不知戒乳反進寒涼冀其除熱愈治愈劇余以消食止吐投之新會皮法半夏厚朴楂肉藿香青防風焦麥芽案一兒先傷於食復感暑邪吐瀉黃連香薷厚朴山楂肉細木通澤瀉案一兒吐瀉腹實醫用寬氣消食之藥愈加脹滿手足逆冷氣粗作渴不能睡臥此土衰而水來侮之以四君子湯加陳皮厚朴車前炮姜二劑而安案一兒吐瀉腹實此係食積傷脾余先令節乳投以消導楂肉麥芽建神麯紫厚朴澤瀉黃連芍藥新會皮案一兒久瘧之後失於調理脾胃虧損已極吐瀉交作身熱不乳危症蜂起宜溫補而佐以防搐之劑人參白朮茯苓熟附子煨肉果鉤藤法夏甘草廣橘紅加煨姜大棗案一兒患吐繼增水瀉面㿠白目睛露吁氣昏睡手足厥冷真陽消耗之候也速宜溫補人參白朮茯苓淮山藥煨肉果木通建澤瀉木香甘草痢疾案一兒七八歲初起外感出汗繼而瀉下如西瓜汁腹痛身熱飲食不進此痢兼外感也因其腹痛先用白芍一兩煎湯時時服之隨後進枳殼陳皮檳榔山楂肉焦麥芽厚朴豬苓澤瀉細木通川黃連芍藥前胡柴胡石蓮肉服後腹痛愈甚前方加延胡木香黃芩又身熱稍減前方去柴胡加藿香間進辰砂六一散燈草湯調服去延胡又腹痛下利少減但飲食未進夜多冷汗前方去枳實前胡又痢減食進服茯苓山藥木香木通黃連車前檳榔甘草燈心又山藥茯苓人參陳皮甘草楂肉煨姜案一兒下血不止腹不痛內經所謂結陰之症實非痢也此係飲食過度損傷脾陰陰氣內結不能外行滲入大腸故也陳皮白朮茯苓山楂肉紫厚朴生地歸身白芍地榆炭粉甘草案一兒久利不止腹不痛煨肉果煨訶子煅龍骨木香炮姜為末參湯下腹痛者非所宜也以藥性太澀恐滯其氣而反增他病耳案一兒患血利自夏至冬未愈始因濕熱繼多感冒血利者風邪傷肝血也法當補虛養血虛回而利自止生地當歸白芍地榆炭炒阿膠人參防風肉果軟柴胡廣木香陳皮案一兒久利元氣大虛腸胃不能禁固曾服參術輩佐以固澀之藥終不能效診脈虛浮四肢倦怠鼻煤目坎危險何疑急用理中湯仍佐以固澀之劑幸高明裁之人參白朮茯苓炙甘草炮乾薑白芍木香烏梅訶子肉罌粟殼案一兒久利腹痛此熱鬱大腸血虛作痛也服歸芍香連痛勢稍減幸六脈和平可無他慮擬和血理氣法俟腹痛全愈然後議補當歸白芍地榆炭木通雲茯苓厚朴甘草山楂肉案一兒久患食積下利身有微熱此脾氣虛損而邪易湊也經云風邪入胃則下利膿黏乾葛防風前胡焦白朮白茯苓黃連澤瀉甘草案一兒下利紅白腹不甚痛只不作渴而小便赤澀因平時喜弄冷水濕傷脾故也蒼朮厚朴陳皮白芍藥川黃連木通澤瀉車前粉甘草案一兒歲許身熱腹痛下利紅白相兼裡急後重弩力則如搐小便不利驚風將至之兆枳殼檳榔厚朴川黃連鉤藤鉤陳皮山楂芍藥細木通服後稍減去檳榔枳殼厚朴加人參是晚連去數次或清瀉或兼積次早視之手足搐掣身熱汗出此脾虛生風已成慢驚之候急進獨參湯恐未能達續進牛黃一分人參八分煨姜一片徐徐服之俟胃氣平復方可無虞案一兒先患水瀉繼增血利裡急後重飲食不思更兼身熱此脾傳腎難愈之症故以養陰和氣清熱開胃之劑投之陳皮厚朴茯苓白芍藥川黃連藿香木通澤瀉杜車前案一兒患赤白利二十餘日腹痛身微熱作嘔脫肛更兼浮腫種種見症皆是脾陰不足之候經曰胃虛則嘔又曰虛則肛門脫出法當議補所謂虛回而利自止矣人參茯苓川黃連白芍藥厚朴陳皮藿香廣木香烏梅肉甘草案一兒患水瀉失於調治至八月初下利無度赤白相兼身熱裡急後重雖久利之後脾氣大損以積滯未盡未可驟補豈堪止澀乎宜行血調氣佐以升提陳皮川黃連白茯苓柴胡地榆山楂當歸身廣木香生地白芍升麻粉甘草案一兒久利腹痛有血兼黃色楂肉麥芽厚朴江枳殼白芍藥地榆川連澤瀉細木通案一兒久利脾胃已虛而又為飲食所傷以致胸腹作脹身發潮熱一友欲施補法養正除邪雖屬正論但胸膈未寬先宜消導香附厚朴陳皮萊蔔子焦白朮茯苓檳榔青皮軟柴胡粉乾葛案一兒患利又外感風邪憎寒發熱宜和解柴胡乾葛山楂肉新會皮黃芩附治一切危利無論新久裡急後重脫肛噤口屢試屢效宜敬珍之陳皮一錢楂肉一錢二分麥芽一兩川黃連一錢白茯苓一錢二分澤瀉一錢二分車前一錢二分包打地榆一錢血利可加炙甘草三分水二鍾加炒黃米一撮煨姜二片大棗一枚熟砂仁末八分燈心三十根煎六分不拘時服又初利方生大黃一兩檳榔一兩木香五錢蜜丸又久利方人參茯苓陳皮芍藥甘草又向東南椿根皮去粗皮曬為末神麯漿丸名固腸丸外感案數歲一兒始因外感風邪惡寒發熱服消食發散之劑經旬不解此係熱傷元氣不得再進表藥以滋陰之劑投之柴胡淡豆豉黃芩元參天花粉知母地骨皮陳皮服二劑諸症俱減惟身熱未除不與藥以寒涼不宜多邊耳宜節飲食避風寒為要三日後熱至午後方涼作止有時竟以骨蒸勞熱治知母地骨皮銀柴胡柴胡黃連山楂粉甘草如熱而不止前方加鱉甲青蒿黃耆案一兒感冒發熱羌活乾葛防風紫蘇葉陳枳殼陳皮山楂麥芽粉甘草案一兒傷食感冒身熱將愈遍身發生淡紅風塊自此而餘邪盡泄可無積瀉之患矣不必洗浴薄荷防風荊芥穗羌活山楂肉蟬衣甘草案一兒十四歲素有骨蒸盜汗因知識已開相火妄動以致身熱盜汗肢體瘦削宜滋陰降火若作外感治誤矣生地歸身白芍川黃柏地骨皮知母秦艽白朮白茯苓新會皮甘草案一兒發熱煩躁口燥唇乾脈兩寸浮數此外感風邪所致淡豆豉薄荷葉黃芩山梔黃連江枳殼新會皮甘草案一兒壯熱煩躁汗出不止服藥已愈後更發熱遂至鼻竅開張痰涎壅盛狀似驚風淡豆豉黃連黑山梔陳皮山楂犀牛黃膽星鉤藤鉤案一兒惡風發熱六七日不解食減面黃語言懶怯手心熱此外感而兼內傷之症乾葛紫蘇葉黃芩黑山梔楂肉陳皮粉甘草生薑案一兒患積熱症服藥愈後失於調補以致元氣虛損變成骨蒸盜汗等症雖積未盡除不宜再消陳皮厚朴麥芽川黃連白芍藥知母甘草楂肉地骨皮服四劑諸症減半又服六君子湯加減而愈案一兒面黃體瘦潮熱不止陳皮楂肉當歸身原生地柴胡知母秦艽地骨皮粉甘草銀柴胡案一兒七八歲發熱數日或疑為瘧投清皮飲不效余診其脈俱虛數惟右關沉滑每至夜則發熱交子刻必有汗此名積症盜汗秦艽知母銀柴胡地骨皮柴胡山楂黃連綿黃耆案一兒數歲骨蒸發熱飲食少進元氣虛憊秦艽知母銀柴胡地骨皮黃連山楂陳皮炙鱉甲白芍藥茯苓白朮香附用烏骨雞去毛雜酒煮爛入前藥打和加煉白蜜丸白湯空心下一錢五分案一兒疳痢愈後極宜大補脾土滋養氣血日後可免虛熱之患矣乃綿延日久飲食不為肌膚五心煩熱足酸唇紅夜汗額露青筋皆因積熱內熾脾胃兩虛所致白朮二兩茯苓一兩半川連一兩半酒炒淮山藥一兩半益智仁一兩半炒人參六錢炙草四錢米仁二兩炒白芍藥二兩酒炒建蓮肉三兩新會二兩神麯糊丸白湯下早晚各三錢案一兒五歲身熱不止見有紅斑乾葛柴胡荊芥穗青防風淡豉山楂枳殼炒麥芽服一劑大汗即前方去防風加前胡身涼脈靜神思頗爽又前胡桔梗黃芩白茯苓地骨皮陳皮鉤藤甘草案一兒傷風后飲食不進睡臥昏沉手足逆冷此大虛之候宜服助脾開胃以扶元氣人參藿香淮山藥陳皮炒黃米案一兒身熱咳嗽喉中有痰此外感所致荊芥防風前胡法半夏江枳殼山楂陳皮桑皮案一兒身熱腹實此外感風邪內傷飲食也柴胡荊芥防風山楂肉江枳殼厚朴陳皮案一兒身熱嘔吐喉中痰鳴大便涎稠此風邪搏於腠理防風荊芥陳皮江枳殼山楂肉前胡桔梗甘草案一兒身熱面熱咳嗽荊芥防風前胡粉乾葛軟柴胡蘇葉枳殼山楂案一兒身熱腹實嘔吐宜解表消導柴胡葛根荊芥青防風江枳殼陳皮楂肉前胡案一兒身熱如火鼻紅腹實拒按此飲食停滯於內風邪搏激於外宜解表消導荊芥防風柴胡紫厚朴江枳殼陳皮楂肉案一兒身熱胃口實按之疼痛服藥即吐乃夾食傷寒也山楂香附江枳殼新會皮柴胡服後身熱稍減胃口仍實柴胡陳皮法半夏山楂肉甘草又嘔吐除身熱稍減宿食消前胡黃芩麥芽新會皮法半夏甘草案一兒夾食傷寒五六日身熱不減口中呻吟咳嗽抽搐眼閉汗出醫用滾痰丸下痰涎而熱仍未除此邪氣壅滯於內宜服消痰理氣退熱消食之劑陳皮楂肉淡豆豉桑白皮前胡桔梗枳殼鉤藤鉤粉甘草案一兒身熱發紅腫塊瘰荊芥防風連翹赤芍藥天花粉元參陳皮柴胡粉甘草案一兒胎熱復感風邪痰鳴氣急重舌前胡黃芩連翹仁新會皮赤芍滑石木通粉甘草案一兒感冒真氣未復又重感於邪左脅作痛時覺畏寒潮熱咳嗽有痰面青神倦似瘧非瘧宜疏肝邪理痰咳柴胡青皮前胡粉葛根新會皮黃芩法夏花粉服二劑身熱已減乳母不守禁忌又復感至三更忽發壯熱戰栗悶倒豫起視之六脈洪數面紅氣促非大汗不能見效即前方加麻黃羌活所謂急則治其標也又久病之後元氣已虛故外邪雖散而咳嗽未除不宜多服煎劑恐損脾氣無以生肺金耳當大劑煎膏頻服勿懈元參白茯苓川貝母陳皮法夏紫菀焦米仁肥知母煎成膏日服數次東垣所謂在上者不厭頻而少是也瘧疾案一兒數歲久患瘡瘍氣血耗損繼患瘧疾月餘方痊然猶間有潮熱小腹有塊如覆杯痛不可忍肌膚瘦削更兼嘔吐此係久瘧耗損脾陰不能運行津液而成也議參耆鱉甲飲人參黃耆炙鱉甲銀柴胡知母陳皮法夏地骨皮嫩青蒿茯苓秦艽服數劑而諸症減又進調理脾胃而愈若不審虛實再行克伐消塊退熱之藥輕者成勞重者致死慎之戒之案一兒歲許寒熱間日而作面黃唇白額露青筋夜不安睡總屬虛象先與抱龍丸四粒日進一丸間服煎劑人參白朮茯苓新會皮法半夏炙草柴胡知母地骨皮案一兒瘧發半月未止面黃食少元氣已虛宜扶脾消痰清熱為主若再進青皮檳榔輩恐犯虛虛之戒白朮茯苓甘草新會皮法半夏柴胡知母厚朴山楂肉案一兒胎瘧數發手足面部俱浮腫六君子湯加厚朴柴胡知母地骨皮姜皮又諸症如前去厚朴加銀柴胡人參一錢又腫勢稍減前方去柴胡加鱉甲人參一錢二分調理半月而痊愈案一兒瘧久面腫腹脹下積垢小水不利飲食減少先投截藥以治其瘧後服白朮茯苓淮山藥川黃連陳皮甘草白芍紫厚朴建澤瀉柴胡木香案一兒發熱僵仆不省兩目斜視狀似驚風乃發瘧之兆先進下痰藥一丸隨服後劑五六發而愈陳皮法半夏柴胡黃芩草果仁枳殼小青皮檳榔防風粉乾葛膽星案數歲一兒瘧後月餘面黃自汗身熱小便後有血此熱傷陰分宜養血滋陰熟地當歸赤芍秦艽肉軟柴胡知母地骨皮案一兒瘧後失於調理隔二三月忽然腫滿小便頻數氣喘皆土弱不能制水人參白朮白茯苓新會皮蘇子澤瀉車前案一兒身熱兩日每晨至酉刻方涼第三日熱至未時忽兩目上視手足搐掣哭不出聲狀似驚風乃變瘧之候因感邪太重拂鬱於內未見其發寒耳先以消痰理氣散邪之藥投之明日果戰寒發熱瘧症顯然矣陳皮法夏膽星青防風軟柴胡前胡青皮黃芩江枳殼粉葛根服後即前方去葛根前胡加桔梗檳榔草果茯苓大凡小兒稟氣未足不能勝其邪頑痰膠固榮衛之氣不行狀似驚風而實瘧也須細辨之案一童春間患瘧愈後時常腹痛從下而上漉漉有聲六脈虛小不合時令此脾經有積而瘧後失於調理致脾虛拂鬱不能宣暢也宜扶脾補元兼養心血人參白朮茯苓淮山藥建澤瀉陳皮芍藥木香酸棗仁石菖蒲甘草案一兒數歲瘧愈幾月復先寒後熱乃元氣虛弱而然以骨蒸治銀柴胡地骨皮黃芩白芍青蒿肥知母軟柴胡陳皮秦艽山楂案一兒瘧數發後每下午不寒而熱此疸瘧也因外邪未盡不可驟進寒涼柴胡黃芩雲茯苓陳皮當歸山楂知母地骨皮案一兒瘧久面色㿠白元氣耗散脾土損傷投以六君子湯加減治之不用截法恐傷真氣也人參陳皮山楂地骨皮肥知母黃芩法夏白朮軟柴胡案一兒久瘧後腹大如鼓陰囊腫小便利而大便五六日不解醫用豬苓澤瀉等藥小便愈清大便愈結蓋久瘧之後脾為木乘以致不能運化精微故脹滿況小便本利而更利之則胃中枯燥而大便愈不通矣宜補脾胃藥中少加肉桂使其性熱下行況木得桂而枯木衰則土實傳化如常矣人參白朮茯苓甜肉桂淮山藥米仁芍藥案一兒患瘧久久成骨蒸勞熱人參白朮茯苓秦艽肉肥知母歸身白芍黃柏地骨皮炙鱉甲棗仁麥芽案一兒瘧後患咳嗽聲嘶食減氣促汗出兩脅作痛吐出膿血俱極臭穢明是肺癰系火氣炎止燒爍肺金而然也宜保肺氣助脾土苦寒溫補均非善治阿膠桔梗川貝母白茯苓米仁百合案一兒瘧疾八九日邪氣將散元氣已損當扶其胃氣滋養元神為主六君子湯加減人參白朮茯苓新會皮法半夏柴胡知母骨皮炙甘草案一兒瘧愈後身熱唇焦手足搐掣咳嗽作嘔腹痛自利曾服參與牛黃身熱稍減第腹實之甚此外感而兼傷食宜清火消痰順氣鎮驚之劑柴胡前胡防風嫩桔梗新會皮山楂芍藥茯苓鉤藤鉤陳膽星黃連木通案一兒瘧疾稍愈間或發熱腹有微積此食積相兼之候今面目浮腫小水不利脾氣嬌弱餘邪未盡不宜峻補擬補中兼利水之劑人參何首烏柴胡法半夏澤瀉車前地骨皮豬苓案一兒瘧愈後身體尫羸不逾旬復發面目虛浮小便如血此積症而兼淋也白茯苓白朮山楂麥門冬木通川黃連案一兒患瘧每發於下午柴胡法半夏白朮白茯苓山楂知母地骨皮陳皮粉甘草案一兒身發紅點仔細視之非痘非痧驗其外身不熱六脈弦瘧症將發之兆次日果作荊芥防風紫蘇葉陳皮山楂肉甘草案一兒每午後發瘧面色萎黃腹實因寒熱太過真陰耗損治以癆症相參柴胡陳皮山楂紫厚朴地骨皮川連知母甘草案一兒瘧久面足虛浮不思飲食以脾陰耗損陽無所依而浮散於外也陳皮山楂知母地骨皮紫厚朴柴胡川連甘草案一兒瘧疾先寒後熱將及八發檳榔草果青皮山楂肉白茯苓黃芩白朮甘草案一女久瘧不止元氣虛憊復感寒邪先宜和解柴胡防風黃芩草果仁法半夏青皮川芎白芍粉甘草新會皮香附案一兒十四歲素稟薄弱久瘧不止食少神倦乃心脾不足宜扶元補脾滋陰降火生地當歸身白芍藥茯神棗仁遠志炙鱉甲秦艽肉知母骨皮人參焦白朮川黃連甘草案一女痘後元氣未復起居飲食不節變為瘧疾法當祛邪消導連服不效且痰喘氣促面白無神四肢浮腫宜理脾消導清熱佐以扶養元氣人參半夏陳皮白茯苓龍膽草蘇子柴胡知母地骨皮山楂肉生薑案一兒患瘧但熱無寒月餘變成骨蒸潮熱宜扶養元陰為主人參白朮茯苓當歸身白芍藥柴胡知母秦艽炙鱉甲地骨皮附瘧久不愈方青皮山楂藿香法半夏白茯苓白朮陳皮香附紫蘇葉肥知母又調理方山楂茯苓知母地骨皮枯黃芩陳皮半夏當歸瘧後面色少神大便艱澀腿腳痠軟時覺虛熱此榮衛之氣未舒當大補氣血八珍湯去地黃加知母地骨皮瘧久虛甚形消肉削服煎劑丸料不應者將此方加減煎成膏服之可免骨蒸咳嗽之患黃耆白朮米仁白茯苓當歸身熟地白芍麥冬銀柴胡地骨皮秦艽鱉甲知母川黃連酸棗仁楂肉
